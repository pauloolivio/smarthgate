<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento por Cômodo</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* ===== LAYOUT ===== */
        .page-header {
            padding: 16px 24px;
            background: #f8fafc;
            border-bottom: 2px solid #e9edf2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .page-header h2 { color: #0f172a; font-size: 20px; }
        .page-header p  { color: #64748b; font-size: 14px; }

        .page-content {
            padding: 16px 24px 100px;
            overflow-y: auto;
            max-height: calc(100vh - 180px);
        }

        /* ===== SELEÇÃO DE CLIENTE ===== */
        .selecao-cliente {
            background: #ffffff;
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #e9edf2;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .selecao-cliente label { font-weight: 600; color: #334155; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .selecao-cliente select {
            padding: 8px 16px; border: 1.5px solid #d1d9e6; border-radius: 10px;
            font-size: 14px; min-width: 220px; flex: 1; background: #fafbfc; transition: border-color 0.2s;
        }
        .selecao-cliente select:focus { outline: none; border-color: #4f46e5; background: white; }
        .selecao-cliente .cliente-info { font-size: 13px; color: #64748b; padding: 4px 12px; background: #f1f5f9; border-radius: 20px; }
        .acoes-rapidas { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }

        /* ===== CATÁLOGO ===== */
        .catalogo-toggle {
            background: #f8fafc; border: 1px solid #e9edf2; border-radius: 12px;
            padding: 10px 18px; margin-bottom: 16px; display: flex;
            justify-content: space-between; align-items: center;
            cursor: pointer; transition: all 0.2s; user-select: none;
        }
        .catalogo-toggle:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .catalogo-toggle .left { display: flex; align-items: center; gap: 12px; }
        .catalogo-toggle .left .icone { font-size: 18px; }
        .catalogo-toggle .left h4 { font-size: 14px; font-weight: 600; color: #0f172a; }
        .catalogo-toggle .left .badge { font-size: 12px; color: #64748b; background: #e9edf2; padding: 2px 12px; border-radius: 12px; }
        .catalogo-toggle .toggle-icon { color: #94a3b8; font-size: 14px; transition: transform 0.2s; }
        .catalogo-toggle .toggle-icon.open { transform: rotate(180deg); }

        .catalogo-body {
            background: #ffffff; border: 1px solid #e9edf2; border-radius: 12px;
            padding: 12px 16px; margin-bottom: 16px; max-height: 300px; overflow-y: auto;
        }
        .catalogo-body.collapsed { display: none; }

        .item-catalogo {
            display: flex; justify-content: space-between; align-items: center;
            padding: 7px 10px; border-bottom: 1px solid #f1f5f9; gap: 10px;
            border-radius: 6px; transition: background 0.15s;
        }
        .item-catalogo:hover { background: #f8fafc; }
        .item-catalogo:last-child { border-bottom: none; }
        .item-catalogo .info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .item-catalogo .info .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .item-catalogo .info .nome { font-size: 13px; color: #0f172a; font-weight: 500; }
        .item-catalogo .info .detalhe { font-size: 11px; color: #94a3b8; }
        .item-catalogo .info .detalhe .marca { background: #f1f5f9; padding: 1px 8px; border-radius: 8px; }
        .item-catalogo .acoes-catalogo { display: flex; align-items: center; gap: 8px; }
        .item-catalogo .acoes-catalogo .preco { font-size: 12px; color: #64748b; min-width: 60px; text-align: right; }
        .btn-add-catalogo {
            padding: 3px 12px; border: none; background: #4f46e5; color: white;
            border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-add-catalogo:hover { background: #4338ca; }

        /* ===== CÔMODOS ===== */
        .comodo-card {
            background: #ffffff; border: 1px solid #e9edf2; border-radius: 14px;
            margin-bottom: 14px; overflow: hidden; transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .comodo-card:hover { border-color: #cbd5e1; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

        .comodo-header {
            padding: 12px 18px; background: #fafbfc; display: flex;
            justify-content: space-between; align-items: center;
            cursor: pointer; border-bottom: 1px solid #e9edf2; transition: background 0.2s; user-select: none;
        }
        .comodo-header:hover { background: #f1f5f9; }
        .comodo-header .left { display: flex; align-items: center; gap: 12px; }
        .comodo-header .left .icone-comodo { font-size: 20px; opacity: 0.7; }
        .comodo-header h3 { font-size: 15px; font-weight: 600; color: #0f172a; }
        .comodo-header .badge-itens { font-size: 12px; color: #94a3b8; background: #f1f5f9; padding: 2px 12px; border-radius: 12px; }
        .comodo-header .right { display: flex; align-items: center; gap: 12px; }
        .comodo-header .total-comodo { font-weight: 700; color: #4f46e5; font-size: 15px; min-width: 90px; text-align: right; }
        .comodo-header .toggle-icon { color: #94a3b8; font-size: 14px; transition: transform 0.2s; }
        .comodo-header .toggle-icon.open { transform: rotate(180deg); }

        .comodo-body { padding: 8px 18px 16px; }
        .comodo-body.collapsed { display: none; }

        /* ===== LINHAS DE ITEM ===== */
        .item-linha {
            display: flex; justify-content: space-between; align-items: center;
            padding: 9px 10px; border-bottom: 1px solid #f1f5f9; gap: 12px;
            border-radius: 8px; transition: background 0.15s;
        }
        .item-linha:hover { background: #f8fafc; }
        .item-linha:last-of-type { border-bottom: none; }

        .item-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .item-info .dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.06); }
        .item-info .nome { font-weight: 500; font-size: 13px; color: #0f172a; }
        .item-info .detalhe { font-size: 11px; color: #94a3b8; margin-left: 4px; }
        .item-info .detalhe .marca { background: #f1f5f9; padding: 1px 8px; border-radius: 8px; }

        .item-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .preco-unit { font-size: 12px; color: #64748b; min-width: 70px; text-align: right; }

        .qtd-control { display: flex; align-items: center; gap: 2px; background: #f1f5f9; border-radius: 8px; padding: 2px 3px; }
        .qtd-control button {
            width: 26px; height: 26px; border: none; background: transparent; border-radius: 6px;
            font-size: 16px; font-weight: 700; cursor: pointer; color: #64748b;
            transition: all 0.15s; display: flex; align-items: center; justify-content: center;
        }
        .qtd-control button:hover { background: #e2e8f0; color: #0f172a; }
        .qtd-control button:active { transform: scale(0.9); }
        .qtd-value { width: 30px; text-align: center; font-weight: 700; font-size: 14px; color: #0f172a; }

        .total-item { font-weight: 600; color: #4f46e5; min-width: 80px; text-align: right; font-size: 14px; }
        .btn-remover {
            border: none; background: transparent; color: #94a3b8;
            cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: all 0.2s; font-size: 15px;
        }
        .btn-remover:hover { color: #dc2626; background: #fef2f2; }

        /* ===== ÁREA ADICIONAR ITEM ===== */
        .add-item-area {
            padding: 10px 8px 4px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
            border-top: 1px dashed #e9edf2; margin-top: 8px;
        }
        .add-item-area label { font-size: 12px; color: #64748b; font-weight: 500; white-space: nowrap; }
        .add-item-area select {
            padding: 6px 12px; border: 1.5px solid #d1d9e6; border-radius: 8px;
            font-size: 13px; flex: 1; min-width: 160px; background: #fafbfc; transition: border-color 0.2s;
        }
        .add-item-area select:focus { outline: none; border-color: #4f46e5; background: white; }
        .btn-add-item {
            padding: 6px 16px; border: none; background: #4f46e5; color: white; border-radius: 8px;
            font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 5px; white-space: nowrap;
        }
        .btn-add-item:hover { background: #4338ca; box-shadow: 0 4px 12px rgba(79,70,229,0.25); }

        /* ===== TOTAL GERAL ===== */
        .total-geral-box {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white; padding: 18px 28px; border-radius: 14px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 14px; margin-top: 20px;
            box-shadow: 0 8px 30px rgba(79,70,229,0.25);
            position: sticky; bottom: 0;
        }
        .total-geral-box .label { font-size: 14px; opacity: 0.85; font-weight: 500; }
        .total-geral-box .valor { font-size: 28px; font-weight: 800; }
        .total-geral-box .detalhes { display: flex; gap: 16px; font-size: 13px; opacity: 0.8; flex-wrap: wrap; }

        /* ===== ESTADO VAZIO ===== */
        .empty-state { text-align: center; padding: 48px 20px; color: #94a3b8; }
        .empty-state .icone { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state h3 { font-size: 18px; color: #64748b; margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            z-index: 9000; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        .modal-box {
            background: white; border-radius: 16px; padding: 24px;
            width: 360px; max-width: 95vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalFade 0.2s ease;
        }
        .modal-box h3 { font-size: 17px; color: #0f172a; margin-bottom: 14px; }
        .produto-info-modal {
            background: #f8fafc; padding: 10px 14px; border-radius: 8px;
            margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
        }
        .produto-info-modal .dot-modal { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
        .produto-info-modal .nome-modal { font-weight: 600; color: #0f172a; font-size: 14px; flex: 1; }
        .produto-info-modal .preco-modal { color: #4f46e5; font-weight: 600; font-size: 14px; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 13px; font-weight: 500; color: #334155; }
        .form-group select, .form-group input {
            width: 100%; padding: 8px 14px; border: 1.5px solid #d1d9e6;
            border-radius: 8px; font-size: 14px; background: #fafbfc; box-sizing: border-box;
        }
        .form-group select:focus, .form-group input:focus { outline: none; border-color: #4f46e5; background: white; }

        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 16px; padding-top: 14px; border-top: 1px solid #e9edf2; }

        @keyframes modalFade {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: 80px; right: 20px; padding: 12px 22px;
            border-radius: 12px; font-size: 14px; font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2); z-index: 9999; color: white;
            max-width: 380px; animation: toastIn 0.3s ease; display: flex; align-items: center; gap: 10px;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(30px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ===== DARK MODE ===== */
        body.dark-mode .page-header { background: #1e293b; border-color: #334155; }
        body.dark-mode .page-header h2 { color: #f1f5f9; }
        body.dark-mode .selecao-cliente { background: #1e293b; border-color: #334155; }
        body.dark-mode .selecao-cliente label { color: #e2e8f0; }
        body.dark-mode .selecao-cliente select { background: #0f172a; border-color: #334155; color: #f1f5f9; }
        body.dark-mode .selecao-cliente .cliente-info { background: #334155; color: #cbd5e1; }
        body.dark-mode .catalogo-toggle { background: #1e293b; border-color: #334155; }
        body.dark-mode .catalogo-toggle .left h4 { color: #f1f5f9; }
        body.dark-mode .catalogo-body { background: #1e293b; border-color: #334155; }
        body.dark-mode .item-catalogo { border-color: #334155; }
        body.dark-mode .item-catalogo:hover { background: #0f172a; }
        body.dark-mode .item-catalogo .info .nome { color: #f1f5f9; }
        body.dark-mode .comodo-card { background: #1e293b; border-color: #334155; }
        body.dark-mode .comodo-header { background: #0f172a; border-color: #334155; }
        body.dark-mode .comodo-header:hover { background: #1a2332; }
        body.dark-mode .comodo-header h3 { color: #f1f5f9; }
        body.dark-mode .comodo-header .badge-itens { background: #334155; color: #94a3b8; }
        body.dark-mode .item-linha:hover { background: #0f172a; }
        body.dark-mode .item-info .nome { color: #f1f5f9; }
        body.dark-mode .qtd-control { background: #334155; }
        body.dark-mode .qtd-control button { color: #94a3b8; }
        body.dark-mode .qtd-control button:hover { background: #475569; color: #f1f5f9; }
        body.dark-mode .qtd-value { color: #f1f5f9; }
        body.dark-mode .add-item-area select { background: #0f172a; border-color: #334155; color: #f1f5f9; }
        body.dark-mode .modal-box { background: #1e293b; }
        body.dark-mode .modal-box h3 { color: #f1f5f9; }
        body.dark-mode .form-group label { color: #e2e8f0; }
        body.dark-mode .form-group select, body.dark-mode .form-group input { background: #0f172a; border-color: #334155; color: #f1f5f9; }
        body.dark-mode .produto-info-modal { background: #0f172a; }
        body.dark-mode .produto-info-modal .nome-modal { color: #f1f5f9; }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 768px) {
            .page-content { padding: 12px 12px 100px; }
            .selecao-cliente { flex-direction: column; align-items: stretch; }
            .acoes-rapidas { margin-left: 0; }
            .item-linha { flex-wrap: wrap; }
            .item-info { flex: 1 1 100%; }
            .item-actions { flex: 1 1 100%; justify-content: space-between; }
            .add-item-area { flex-direction: column; align-items: stretch; }
            .btn-add-item { justify-content: center; }
            .total-geral-box { flex-direction: column; text-align: center; padding: 14px 20px; }
            .total-geral-box .detalhes { justify-content: center; }
        }
        @media (max-width: 480px) {
            .badge-itens { display: none; }
            .item-info .detalhe .marca { display: none; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="page-header">
        <div>
            <h2>🏗️ Orçamento por Cômodo</h2>
            <p>Monte o projeto adicionando produtos em cada ambiente</p>
        </div>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <button class="btn btn-success" onclick="exportarOrcamento()">📊 Exportar</button>
            <button class="btn btn-primary" onclick="imprimirOrcamento()">🖨️ Imprimir</button>
            <button class="btn btn-outline" onclick="carregarDados()">🔄 Atualizar</button>
            <button class="btn btn-outline" onclick="limparOrcamento()" style="color:#dc2626;border-color:#fee2e2;">🗑️ Limpar</button>
        </div>
    </div>

    <div class="page-content">
        <!-- CLIENTE -->
        <div class="selecao-cliente">
            <label>👤 Cliente:</label>
            <select id="clienteSelect" onchange="onClienteChange()">
                <option value="">— Selecione um cliente —</option>
            </select>
            <span class="cliente-info" id="clienteInfo">Nenhum cliente selecionado</span>
            <div class="acoes-rapidas">
                <button class="btn btn-primary btn-sm" onclick="irParaClientes()">📋 Gerenciar</button>
                <button class="btn btn-outline btn-sm" onclick="salvarManual()">💾 Salvar</button>
            </div>
        </div>

        <!-- CATÁLOGO -->
        <div class="catalogo-toggle" onclick="toggleCatalogo()">
            <div class="left">
                <span class="icone">📦</span>
                <h4>Catálogo de Materiais</h4>
                <span class="badge" id="badgeCatalogo">0 produtos</span>
            </div>
            <span class="toggle-icon open" id="iconCatalogo">▼</span>
        </div>
        <div class="catalogo-body" id="catalogoBody">
            <div style="text-align:center;padding:20px;color:#94a3b8;">Carregando...</div>
        </div>

        <!-- CÔMODOS -->
        <div id="comodosContainer"></div>

        <!-- TOTAL GERAL -->
        <div class="total-geral-box" id="totalGeralBox" style="display:none;">
            <div>
                <div class="label">💰 VALOR TOTAL DO PROJETO</div>
                <div class="valor" id="totalValor">R$ 0,00</div>
            </div>
            <div class="detalhes">
                <span id="totalItens">📦 0 itens</span>
                <span id="totalComodos">🏠 0 cômodos</span>
            </div>
        </div>
    </div>

    <!-- MODAL: ADICIONAR PRODUTO A CÔMODO -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <h3>➕ Adicionar ao Cômodo</h3>
            <div class="produto-info-modal">
                <span class="dot-modal" id="modalDot"></span>
                <span class="nome-modal" id="modalNome">—</span>
                <span class="preco-modal" id="modalPreco">R$ 0,00</span>
            </div>
            <div class="form-group">
                <label>Cômodo:</label>
                <select id="modalComodo">
                    <option value="">Escolha um cômodo...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Quantidade:</label>
                <input type="number" id="modalQtd" value="1" min="1" step="1">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="confirmarModal()">Adicionar</button>
            </div>
        </div>
    </div>

    <script>
    // =============================================
    //  ESTADO GLOBAL
    // =============================================
    let produtosData  = [];   // lista completa de produtos do Firebase
    let clientesData  = [];   // lista completa de clientes do Firebase
    let orcamentoData = {};   // { "prodId__comodo": { id, qtd, comodo, nome, marca, protocolo, preco, cor } }
    let produtoModal  = null; // produto sendo adicionado no modal
    let _autoSave     = null; // debounce de salvamento

    // =============================================
    //  UTILITÁRIOS
    // =============================================

    /** Gera a chave usada em orcamentoData: usa __ como separador seguro */
    function makeKey(produtoId, comodo) {
        return `${produtoId}__${comodo}`;
    }

    /** Obtém instância do Database a partir do pai (iframe) ou window */
    function getDb() {
        try {
            if (window.parent && window.parent.getDadosGlobais) {
                const db = window.parent.getDadosGlobais().db;
                if (db) return db;
            }
            if (window.db) return window.db;
        } catch (e) {}
        return null;
    }

    function showToast(msg, type = 'info') {
        const colors = { success:'#0b9e5e', error:'#dc2626', warning:'#d97706', info:'#4f46e5' };
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = colors[type] || colors.info;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3500);
    }

    function fmtBRL(v) {
        return 'R$ ' + Number(v || 0).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    }

    function esc(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // =============================================
    //  FIREBASE — CARREGAR / SALVAR
    // =============================================

    async function carregarDados() {
        try {
            const db = getDb();
            if (!db) throw new Error('Database não disponível. Verifique a conexão.');

            showToast('⏳ Carregando dados...', 'info');

            const [produtos, clientes] = await Promise.all([
                db.getProdutos(true),
                db.getClientes()
            ]);

            produtosData = produtos;
            clientesData = clientes;

            preencherSelectClientes();

            // Se já havia cliente selecionado, recarregar orçamento dele
            const clienteId = document.getElementById('clienteSelect').value;
            if (clienteId) {
                await carregarOrcamento(clienteId);
            } else {
                orcamentoData = {};
            }

            renderCatalogo();
            renderComodos();

            showToast(`✅ ${produtosData.length} produtos · ${clientesData.length} clientes`, 'success');
            if (window.parent && window.parent.atualizarStatus) {
                window.parent.atualizarStatus(`✅ ${produtosData.length} produtos carregados`);
            }
        } catch (err) {
            console.error('❌ carregarDados:', err);
            showToast('❌ ' + err.message, 'error');
        }
    }

    async function carregarOrcamento(clienteId) {
        try {
            const db = getDb();
            if (!db) { orcamentoData = {}; return; }

            const raw = await db.getOrcamentoComodo(clienteId);

            orcamentoData = {};
            if (raw && typeof raw === 'object') {
                Object.entries(raw).forEach(([key, val]) => {
                    // Aceita tanto chaves antigas (prodId_comodo) quanto novas (prodId__comodo)
                    if (val && val.qtd > 0 && val.comodo && val.id) {
                        // Normaliza para o novo padrão com __
                        const newKey = makeKey(val.id, val.comodo);
                        orcamentoData[newKey] = {
                            id:        val.id,
                            qtd:       parseInt(val.qtd) || 0,
                            comodo:    val.comodo,
                            nome:      val.nome || '',
                            marca:     val.marca || '',
                            protocolo: val.protocolo || '',
                            preco:     parseFloat(val.preco) || 0,
                            cor:       val.cor || '#4f46e5'
                        };
                    }
                });
            }
            console.log(`📂 Orçamento carregado: ${Object.keys(orcamentoData).length} itens`);
        } catch (err) {
            console.error('❌ carregarOrcamento:', err);
            orcamentoData = {};
        }
    }

    async function salvarNoFirebase() {
        const clienteId = document.getElementById('clienteSelect').value;
        if (!clienteId) return;

        try {
            const db = getDb();
            if (!db) return;

            // Constrói objeto limpo para salvar
            const payload = {};
            Object.entries(orcamentoData).forEach(([key, val]) => {
                if (val && val.qtd > 0) {
                    payload[key] = {
                        id:        val.id,
                        qtd:       parseInt(val.qtd),
                        comodo:    val.comodo,
                        nome:      val.nome || '',
                        marca:     val.marca || '',
                        protocolo: val.protocolo || '',
                        preco:     parseFloat(val.preco) || 0,
                        cor:       val.cor || '#4f46e5'
                    };
                }
            });

            await db.salvarOrcamentoComodo(clienteId, payload);
            console.log('💾 Orçamento salvo:', Object.keys(payload).length, 'itens');
        } catch (err) {
            console.error('❌ salvarNoFirebase:', err);
        }
    }

    function agendarSalvamento() {
        clearTimeout(_autoSave);
        _autoSave = setTimeout(salvarNoFirebase, 1200);
    }

    async function salvarManual() {
        clearTimeout(_autoSave);
        await salvarNoFirebase();
        showToast('💾 Orçamento salvo!', 'success');
    }

    async function limparOrcamento() {
        const clienteId = document.getElementById('clienteSelect').value;
        if (!clienteId) { showToast('⚠️ Selecione um cliente primeiro', 'warning'); return; }
        if (!confirm('Limpar todo o orçamento deste cliente?')) return;

        try {
            const db = getDb();
            if (db) await db.deletarOrcamentoComodo(clienteId);
            orcamentoData = {};
            renderCatalogo();
            renderComodos();
            showToast('🗑️ Orçamento limpo', 'info');
        } catch (err) {
            showToast('❌ Erro ao limpar: ' + err.message, 'error');
        }
    }

    // =============================================
    //  CLIENTE
    // =============================================

    function preencherSelectClientes() {
        const sel = document.getElementById('clienteSelect');
        const prev = sel.value;
        sel.innerHTML = '<option value="">— Selecione um cliente —</option>';
        clientesData.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.nome;
            if (c.id === prev) opt.selected = true;
            sel.appendChild(opt);
        });
    }

    async function onClienteChange() {
        const clienteId = document.getElementById('clienteSelect').value;
        const cliente   = clientesData.find(c => c.id === clienteId) || null;
        const info      = document.getElementById('clienteInfo');

        if (cliente) {
            info.textContent = `${cliente.nome}${cliente.telefone ? ' · ' + cliente.telefone : ''}`;
            await carregarOrcamento(clienteId);
        } else {
            info.textContent = 'Nenhum cliente selecionado';
            orcamentoData = {};
        }

        renderCatalogo();
        renderComodos();
    }

    // =============================================
    //  RENDER — CATÁLOGO
    // =============================================

    function renderCatalogo() {
        const body  = document.getElementById('catalogoBody');
        const badge = document.getElementById('badgeCatalogo');

        if (!produtosData.length) {
            body.innerHTML = '<div style="text-align:center;padding:20px;color:#94a3b8;">Nenhum produto cadastrado</div>';
            badge.textContent = '0 produtos';
            return;
        }

        badge.textContent = produtosData.length + ' produtos';

        // Calcula totais usados por produto (soma de todos os cômodos)
        const usadoPorProduto = {};
        Object.values(orcamentoData).forEach(e => {
            if (e && e.id) usadoPorProduto[e.id] = (usadoPorProduto[e.id] || 0) + (e.qtd || 0);
        });

        body.innerHTML = produtosData.map(p => {
            const usado = usadoPorProduto[p.id] || 0;
            return `
            <div class="item-catalogo">
                <div class="info">
                    <span class="dot" style="background:${p.cor||'#4f46e5'};"></span>
                    <span class="nome">${esc(p.nome || p.dispositivo || 'Sem nome')}</span>
                    <span class="detalhe">
                        <span class="marca">${esc(p.marca||'')}</span>
                        ${p.protocolo ? ' · ' + esc(p.protocolo) : ''}
                        ${usado > 0 ? ` · <strong style="color:#4f46e5;">${usado} usados</strong>` : ''}
                    </span>
                </div>
                <div class="acoes-catalogo">
                    <span class="preco">${fmtBRL(p.preco)}</span>
                    <button class="btn-add-catalogo" onclick="abrirModal('${p.id}')">＋</button>
                </div>
            </div>`;
        }).join('');
    }

    // =============================================
    //  RENDER — CÔMODOS
    // =============================================

    function renderComodos() {
        const container = document.getElementById('comodosContainer');

        if (!produtosData.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icone">🏗️</div>
                    <h3>Nenhum produto cadastrado</h3>
                    <p>Cadastre produtos para montar orçamentos por cômodo</p>
                    <button class="btn btn-primary" style="margin-top:12px"
                        onclick="if(window.parent&&window.parent.navegarPara)window.parent.navegarPara('produtos')">
                        📦 Ir para Produtos
                    </button>
                </div>`;
            document.getElementById('totalGeralBox').style.display = 'none';
            return;
        }

        // ---- Determina a lista de cômodos a exibir ----
        // 1. Cômodos que existem nos produtos do catálogo
        const comodosDosCatalogos = new Set(produtosData.map(p => p.comodo).filter(Boolean));
        // 2. Cômodos que existem no orçamento atual (pode ter cômodos "livres" adicionados via modal)
        Object.values(orcamentoData).forEach(e => { if (e && e.comodo) comodosDosCatalogos.add(e.comodo); });

        const comodos = [...comodosDosCatalogos].sort();

        let totalGeral = 0, totalItens = 0;
        let html = '';

        comodos.forEach(comodo => {
            // Itens já adicionados ao orçamento neste cômodo
            const itensOrc = Object.values(orcamentoData).filter(e => e && e.comodo === comodo && e.qtd > 0);

            // IDs dos produtos já no orçamento deste cômodo
            const idsNoOrc = new Set(itensOrc.map(e => e.id));

            // Produtos do catálogo que pertencem a este cômodo mas ainda NÃO foram adicionados
            const produtosDisponiveis = produtosData.filter(p => p.comodo === comodo && !idsNoOrc.has(p.id));

            let totalComodo = 0;
            itensOrc.forEach(e => { totalComodo += e.qtd * e.preco; });
            totalGeral += totalComodo;
            totalItens += itensOrc.reduce((s, e) => s + e.qtd, 0);

            const slug = comodo.replace(/[^a-zA-Z0-9]/g, '_');

            // --- Linhas dos itens JÁ ADICIONADOS ---
            const linhasItens = itensOrc.map(e => {
                const key    = makeKey(e.id, comodo);
                const total  = e.qtd * e.preco;
                return `
                <div class="item-linha" data-key="${key}">
                    <div class="item-info">
                        <span class="dot" style="background:${e.cor||'#4f46e5'};"></span>
                        <span class="nome">${esc(e.nome)}</span>
                        <span class="detalhe">
                            ${e.marca ? `<span class="marca">${esc(e.marca)}</span>` : ''}
                            ${e.protocolo ? ' · ' + esc(e.protocolo) : ''}
                        </span>
                    </div>
                    <div class="item-actions">
                        <span class="preco-unit">${fmtBRL(e.preco)}</span>
                        <div class="qtd-control">
                            <button onclick="ajustar('${key}', -1)" title="Diminuir">−</button>
                            <span class="qtd-value" id="qtdVal_${key}">${e.qtd}</span>
                            <button onclick="ajustar('${key}', +1)" title="Aumentar">+</button>
                        </div>
                        <span class="total-item" id="totItem_${key}">${fmtBRL(total)}</span>
                        <button class="btn-remover" onclick="remover('${key}')" title="Remover">✕</button>
                    </div>
                </div>`;
            }).join('');

            // --- Produtos disponíveis do catálogo (não adicionados ainda) ---
            const opcoesSelect = produtosData.map(p =>
                `<option value="${p.id}">${esc(p.nome||p.dispositivo||'?')} — ${fmtBRL(p.preco)}</option>`
            ).join('');

            html += `
            <div class="comodo-card">
                <div class="comodo-header" onclick="toggleComodo(this)">
                    <div class="left">
                        <span class="icone-comodo">🏠</span>
                        <h3>${esc(comodo)}</h3>
                        <span class="badge-itens">${itensOrc.length} ${itensOrc.length === 1 ? 'item' : 'itens'}</span>
                    </div>
                    <div class="right">
                        <span class="total-comodo" id="totComodo_${slug}">${fmtBRL(totalComodo)}</span>
                        <span class="toggle-icon open">▼</span>
                    </div>
                </div>
                <div class="comodo-body">
                    ${linhasItens || '<div style="padding:10px 0;color:#94a3b8;font-size:13px;">Nenhum produto adicionado neste cômodo ainda.</div>'}
                    <div class="add-item-area">
                        <label>➕ Adicionar:</label>
                        <select id="addSel_${slug}">
                            <option value="">— escolha um produto —</option>
                            ${opcoesSelect}
                        </select>
                        <button class="btn-add-item" onclick="adicionarDoSelect('${comodo}')">
                            ➕ Adicionar
                        </button>
                    </div>
                </div>
            </div>`;
        });

        container.innerHTML = html;

        // Total geral
        const box = document.getElementById('totalGeralBox');
        if (totalItens > 0) {
            box.style.display = 'flex';
            document.getElementById('totalValor').textContent  = fmtBRL(totalGeral);
            document.getElementById('totalItens').textContent  = `📦 ${totalItens} ${totalItens===1?'item':'itens'}`;
            document.getElementById('totalComodos').textContent = `🏠 ${comodos.length} cômodos`;
        } else {
            box.style.display = 'none';
        }
    }

    // =============================================
    //  AÇÕES NOS ITENS
    // =============================================

    /** Ajusta quantidade de um item pela sua key */
    function ajustar(key, delta) {
        const entry = orcamentoData[key];
        if (!entry) return;

        let novaQtd = (entry.qtd || 0) + delta;
        if (novaQtd < 0) novaQtd = 0;

        if (novaQtd === 0) {
            delete orcamentoData[key];
            renderCatalogo();
            renderComodos();
        } else {
            entry.qtd = novaQtd;
            // Atualiza só os elementos afetados (sem re-renderizar tudo)
            const spanQtd  = document.getElementById(`qtdVal_${key}`);
            const spanTot  = document.getElementById(`totItem_${key}`);
            const comodo   = entry.comodo;
            const slug     = comodo.replace(/[^a-zA-Z0-9]/g, '_');
            const spanComodo = document.getElementById(`totComodo_${slug}`);

            if (spanQtd) spanQtd.textContent = novaQtd;
            if (spanTot) spanTot.textContent  = fmtBRL(novaQtd * entry.preco);

            // Recalcula total do cômodo
            if (spanComodo) {
                const totComodo = Object.values(orcamentoData)
                    .filter(e => e && e.comodo === comodo)
                    .reduce((s, e) => s + e.qtd * e.preco, 0);
                spanComodo.textContent = fmtBRL(totComodo);
            }

            // Atualiza total geral e catálogo
            renderCatalogo();
            atualizarTotalGeral();
        }

        agendarSalvamento();
    }

    /** Remove um item pelo key */
    function remover(key) {
        if (!orcamentoData[key]) return;
        const comodo = orcamentoData[key].comodo;
        delete orcamentoData[key];
        renderCatalogo();
        renderComodos();
        agendarSalvamento();
        showToast(`🗑️ Item removido do ${comodo}`, 'info');
    }

    /** Adiciona produto a partir do <select> dentro do cômodo */
    function adicionarDoSelect(comodo) {
        const slug    = comodo.replace(/[^a-zA-Z0-9]/g, '_');
        const sel     = document.getElementById(`addSel_${slug}`);
        if (!sel) return;

        const prodId  = sel.value;
        if (!prodId) { showToast('⚠️ Selecione um produto', 'warning'); return; }

        const produto = produtosData.find(p => p.id === prodId);
        if (!produto) { showToast('⚠️ Produto não encontrado', 'warning'); return; }

        const key = makeKey(prodId, comodo);

        if (orcamentoData[key]) {
            orcamentoData[key].qtd += 1;
        } else {
            orcamentoData[key] = criarEntrada(produto, comodo, 1);
        }

        sel.value = '';
        renderCatalogo();
        renderComodos();
        agendarSalvamento();
        showToast(`✅ ${produto.nome || produto.dispositivo} adicionado ao ${comodo}`, 'success');
    }

    function criarEntrada(produto, comodo, qtd = 1) {
        return {
            id:        produto.id,
            qtd:       qtd,
            comodo:    comodo,
            nome:      produto.nome || produto.dispositivo || 'Sem nome',
            marca:     produto.marca || '',
            protocolo: produto.protocolo || '',
            preco:     parseFloat(produto.preco) || 0,
            cor:       produto.cor || '#4f46e5'
        };
    }

    // =============================================
    //  MODAL — ADICIONAR PELO CATÁLOGO
    // =============================================

    function abrirModal(produtoId) {
        const produto = produtosData.find(p => p.id === produtoId);
        if (!produto) return;

        produtoModal = produto;

        document.getElementById('modalDot').style.background   = produto.cor || '#4f46e5';
        document.getElementById('modalNome').textContent        = produto.nome || produto.dispositivo || '—';
        document.getElementById('modalPreco').textContent       = fmtBRL(produto.preco);
        document.getElementById('modalQtd').value              = 1;

        const sel = document.getElementById('modalComodo');
        sel.innerHTML = '<option value="">Escolha um cômodo...</option>';

        // Lista de cômodos: dos produtos + dos já salvos no orçamento
        const comodosSet = new Set(produtosData.map(p => p.comodo).filter(Boolean));
        Object.values(orcamentoData).forEach(e => { if (e && e.comodo) comodosSet.add(e.comodo); });

        [...comodosSet].sort().forEach(c => {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            sel.appendChild(opt);
        });

        // Opção de criar cômodo novo
        const optNovo = document.createElement('option');
        optNovo.value = '__novo__';
        optNovo.textContent = '➕ Criar novo cômodo...';
        sel.appendChild(optNovo);

        // Pré-seleciona o cômodo padrão do produto
        if (produto.comodo) sel.value = produto.comodo;

        document.getElementById('modalOverlay').classList.add('active');
    }

    function fecharModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        produtoModal = null;
    }

    function confirmarModal() {
        if (!produtoModal) return;

        const sel      = document.getElementById('modalComodo');
        let comodo     = sel.value;
        const qtd      = parseInt(document.getElementById('modalQtd').value) || 1;

        if (!comodo) { showToast('⚠️ Selecione um cômodo', 'warning'); return; }

        if (comodo === '__novo__') {
            const nome = prompt('Nome do novo cômodo:');
            if (!nome || !nome.trim()) { showToast('⚠️ Nome inválido', 'warning'); return; }
            comodo = nome.trim();
        }

        const key = makeKey(produtoModal.id, comodo);

        if (orcamentoData[key]) {
            orcamentoData[key].qtd += qtd;
        } else {
            orcamentoData[key] = criarEntrada(produtoModal, comodo, qtd);
        }

        fecharModal();
        renderCatalogo();
        renderComodos();
        agendarSalvamento();
        showToast(`✅ ${qtd}× ${produtoModal.nome || produtoModal.dispositivo} → ${comodo}`, 'success');
    }

    // =============================================
    //  TOGGLE CATÁLOGO / CÔMODO
    // =============================================

    function toggleCatalogo() {
        document.getElementById('catalogoBody').classList.toggle('collapsed');
        document.getElementById('iconCatalogo').classList.toggle('open');
    }

    function toggleComodo(header) {
        const body = header.nextElementSibling;
        const icon = header.querySelector('.toggle-icon');
        if (body) body.classList.toggle('collapsed');
        if (icon) icon.classList.toggle('open');
    }

    // =============================================
    //  TOTAL GERAL (atualização leve)
    // =============================================

    function atualizarTotalGeral() {
        let total = 0, itens = 0;
        const comodosSet = new Set();
        Object.values(orcamentoData).forEach(e => {
            if (e && e.qtd > 0) {
                total += e.qtd * e.preco;
                itens += e.qtd;
                comodosSet.add(e.comodo);
            }
        });

        const box = document.getElementById('totalGeralBox');
        if (itens > 0) {
            box.style.display = 'flex';
            document.getElementById('totalValor').textContent   = fmtBRL(total);
            document.getElementById('totalItens').textContent   = `📦 ${itens} ${itens===1?'item':'itens'}`;
            document.getElementById('totalComodos').textContent  = `🏠 ${comodosSet.size} cômodos`;
        } else {
            box.style.display = 'none';
        }
    }

    // =============================================
    //  IMPRIMIR / EXPORTAR
    // =============================================

    function imprimirOrcamento() {
        const clienteId = document.getElementById('clienteSelect').value;
        const cliente   = clientesData.find(c => c.id === clienteId);
        if (!cliente) { showToast('⚠️ Selecione um cliente primeiro', 'warning'); return; }

        const itens = Object.values(orcamentoData).filter(e => e && e.qtd > 0);
        if (!itens.length) { showToast('⚠️ Adicione produtos ao orçamento primeiro', 'warning'); return; }

        const dados = {
            id:            'ORC-' + Date.now().toString(36).toUpperCase(),
            numero:        'ORC-' + Date.now().toString(36).toUpperCase(),
            cliente:       cliente,
            vendedor:      sessionStorage.getItem('userEmail') || 'Não informado',
            status:        'pendente',
            dataCriacao:   new Date().toISOString(),
            valorTotal:    itens.reduce((s, e) => s + e.qtd * e.preco, 0),
            produtos:      itens,
            empresaNome:   'SmartHome Automação',
            empresaSub:    'Projetos e instalação de automação residencial',
            condicoes: {
                validade: '30 dias',
                pagamento: '50% entrada + 50% na entrega',
                garantia: '12 meses',
                prazo: '15 dias úteis',
                observacao: 'Valores sujeitos a alteração conforme cotação do dia'
            },
            observacoes: ''
        };

        // Salva no localStorage para a página de impressão
        localStorage.setItem('orcamentoPrintData', JSON.stringify(dados));

        // Abre a página de impressão
        if (window.parent && window.parent.abrirImpressaoComDados) {
            window.parent.abrirImpressaoComDados(dados);
        } else {
            window.open('../pages/orcamento-print.html', '_blank');
        }
        showToast('🖨️ Abrindo impressão...', 'info');
    }

    function exportarOrcamento() {
        const clienteId = document.getElementById('clienteSelect').value;
        const cliente   = clientesData.find(c => c.id === clienteId);
        const nome      = cliente ? cliente.nome : 'Sem cliente';

        const comodosMap = {};
        Object.values(orcamentoData).forEach(e => {
            if (e && e.qtd > 0) {
                if (!comodosMap[e.comodo]) comodosMap[e.comodo] = [];
                comodosMap[e.comodo].push(e);
            }
        });

        let totalGeral = 0;
        let html = `<html><head><meta charset="UTF-8"><title>Orçamento - ${nome}</title>
        <style>body{font-family:Arial,sans-serif;padding:30px}h1{color:#1a1a2e}
        table{width:100%;border-collapse:collapse;margin-top:12px}
        th{background:#4f46e5;color:white;padding:8px 10px;text-align:left}
        td{padding:7px 10px;border-bottom:1px solid #ddd}
        .tot{font-weight:bold;background:#f0f4ff}.gtot{font-size:18px;color:#4f46e5}
        .ct{margin-top:20px;font-size:15px;font-weight:600}
        </style></head><body>
        <h1>🏠 Orçamento por Cômodo</h1>
        <p><strong>Cliente:</strong> ${nome}</p>
        <p><strong>Data:</strong> ${new Date().toLocaleString('pt-BR')}</p><hr>`;

        Object.keys(comodosMap).sort().forEach(comodo => {
            const itens = comodosMap[comodo];
            let totComodo = 0;
            html += `<p class="ct">🏠 ${comodo}</p><table>
            <tr><th>Produto</th><th>Marca</th><th>Qtd</th><th>Unitário</th><th>Total</th></tr>`;
            itens.forEach(e => {
                const t = e.qtd * e.preco; totComodo += t; totalGeral += t;
                html += `<tr><td>${e.nome}</td><td>${e.marca||'—'}</td><td>${e.qtd}</td>
                <td>${fmtBRL(e.preco)}</td><td>${fmtBRL(t)}</td></tr>`;
            });
            html += `<tr class="tot"><td colspan="4" style="text-align:right">Total do cômodo</td>
            <td>${fmtBRL(totComodo)}</td></tr></table>`;
        });

        html += `<hr><h2 class="gtot">💰 Total Geral: ${fmtBRL(totalGeral)}</h2></body></html>`;

        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([html], { type: 'text/html;charset=utf-8' }));
        a.download = `orcamento_${nome}_${new Date().toISOString().slice(0,10)}.html`;
        a.click();
        showToast('📊 Exportado com sucesso!', 'success');
    }

    // =============================================
    //  NAVEGAÇÃO
    // =============================================

    function irParaClientes() {
        if (window.parent && window.parent.navegarPara) window.parent.navegarPara('clientes');
    }

    // =============================================
    //  INICIALIZAÇÃO
    // =============================================

    document.addEventListener('DOMContentLoaded', () => {
        // Dark mode
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');

        // Fechar modal ao clicar fora
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) fecharModal();
        });

        // Fechar modal com ESC
        document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharModal(); });

        // Auto-save a cada 30s se houver dados
        setInterval(() => {
            const clienteId = document.getElementById('clienteSelect').value;
            if (clienteId && Object.keys(orcamentoData).length > 0) salvarNoFirebase();
        }, 30000);

        // Carregar dados do Firebase
        carregarDados();
    });
    </script>
</body>
</html>
