<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .page-header {
            padding: 16px 24px;
            background: #f8fafc;
            border-bottom: 2px solid #e9edf2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .page-header h2 {
            color: #0f172a;
        }

        .page-header p {
            color: #64748b;
            font-size: 14px;
        }

        .page-content {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(100vh - 180px);
        }

        /* BARRA DE BUSCA E FILTROS */
        .search-bar {
            background: #ffffff;
            border: 1px solid #e9edf2;
            border-radius: 12px;
            padding: 14px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .search-bar .search-input-wrapper {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-bar .search-input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-bar .search-input-wrapper input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            border: 1.5px solid #d1d9e6;
            border-radius: 10px;
            font-size: 14px;
            background: #fafbfc;
            transition: all 0.2s;
        }

        .search-bar .search-input-wrapper input:focus {
            outline: none;
            border-color: #4f46e5;
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08);
        }

        .search-bar .search-input-wrapper input::placeholder {
            color: #94a3b8;
        }

        .search-bar .search-stats {
            font-size: 13px;
            color: #64748b;
            white-space: nowrap;
            padding: 6px 12px;
            background: #f1f5f9;
            border-radius: 20px;
        }

        .search-bar .search-stats strong {
            color: #0f172a;
        }

        .search-bar .btn-limpar-busca {
            padding: 6px 14px;
            border: none;
            background: #f1f5f9;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
            display: none;
        }

        .search-bar .btn-limpar-busca:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        .search-bar .btn-limpar-busca.visible {
            display: inline-flex;
        }

        /* TABELA DE CLIENTES */
        .table-container {
            background: #ffffff;
            border: 1px solid #e9edf2;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .clientes-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .clientes-table thead {
            background: #f8fafc;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .clientes-table th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #475569;
            border-bottom: 2px solid #e9edf2;
            white-space: nowrap;
        }

        .clientes-table th .th-content {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .clientes-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
            color: #0f172a;
        }

        .clientes-table tbody tr {
            transition: background 0.15s;
        }

        .clientes-table tbody tr:hover {
            background: #f8fafc;
        }

        .clientes-table tbody tr:last-child td {
            border-bottom: none;
        }

        .clientes-table .cliente-nome {
            font-weight: 600;
            color: #0f172a;
        }

        .clientes-table .cliente-info {
            font-size: 13px;
            color: #64748b;
        }

        .clientes-table .cliente-info .label {
            color: #94a3b8;
            font-size: 11px;
        }

        .clientes-table .acoes-cell {
            white-space: nowrap;
            display: flex;
            gap: 6px;
        }

        .clientes-table .acoes-cell .btn {
            padding: 4px 10px;
            font-size: 12px;
        }

        .clientes-table .badge-documento {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            background: #f1f5f9;
            color: #475569;
            font-family: monospace;
        }

        /* PAGINAÇÃO */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-top: 1px solid #e9edf2;
            flex-wrap: wrap;
            gap: 12px;
        }

        .pagination .info {
            font-size: 13px;
            color: #64748b;
        }

        .pagination .info strong {
            color: #0f172a;
        }

        .pagination .buttons {
            display: flex;
            gap: 6px;
        }

        .pagination .buttons button {
            padding: 6px 14px;
            border: 1px solid #d1d9e6;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .pagination .buttons button:hover:not(:disabled) {
            background: #f8fafc;
            border-color: #4f46e5;
            color: #4f46e5;
        }

        .pagination .buttons button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination .buttons button.active {
            background: #4f46e5;
            border-color: #4f46e5;
            color: white;
        }

        .pagination .buttons button.active:hover {
            background: #4338ca;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .empty-state .icone {
            font-size: 48px;
            opacity: 0.5;
            margin-bottom: 12px;
        }

        .empty-state h3 {
            color: #475569;
            margin-bottom: 4px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* MODAL */
        .modal-cliente .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: stretch;
            }

            .search-bar {
                flex-direction: column;
                align-items: stretch;
                padding: 12px 16px;
            }

            .search-bar .search-stats {
                text-align: center;
            }

            .clientes-table th,
            .clientes-table td {
                padding: 8px 12px;
                font-size: 13px;
            }

            .clientes-table .cliente-info .label {
                display: none;
            }

            .modal-cliente .form-row {
                grid-template-columns: 1fr;
            }

            .pagination {
                flex-direction: column;
                align-items: center;
            }

            .pagination .buttons {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .clientes-table th:nth-child(3),
            .clientes-table td:nth-child(3) {
                display: none;
            }

            .clientes-table .acoes-cell .btn span {
                display: none;
            }

            .clientes-table .acoes-cell .btn {
                padding: 4px 8px;
            }
        }

        /* Dark Mode */
        body.dark-mode .page-header {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .page-header h2 {
            color: #f1f5f9;
        }

        body.dark-mode .search-bar {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .search-bar .search-input-wrapper input {
            background: #0f172a;
            border-color: #334155;
            color: #f1f5f9;
        }

        body.dark-mode .search-bar .search-input-wrapper input:focus {
            border-color: #818cf8;
            background: #0f172a;
        }

        body.dark-mode .search-bar .search-stats {
            background: #334155;
            color: #94a3b8;
        }

        body.dark-mode .search-bar .search-stats strong {
            color: #f1f5f9;
        }

        body.dark-mode .table-container {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .clientes-table thead {
            background: #0f172a;
        }

        body.dark-mode .clientes-table th {
            color: #94a3b8;
            border-color: #334155;
        }

        body.dark-mode .clientes-table td {
            color: #f1f5f9;
            border-color: #334155;
        }

        body.dark-mode .clientes-table tbody tr:hover {
            background: #0f172a;
        }

        body.dark-mode .clientes-table .cliente-nome {
            color: #f1f5f9;
        }

        body.dark-mode .clientes-table .cliente-info {
            color: #94a3b8;
        }

        body.dark-mode .clientes-table .badge-documento {
            background: #334155;
            color: #94a3b8;
        }

        body.dark-mode .pagination {
            border-color: #334155;
        }

        body.dark-mode .pagination .info {
            color: #94a3b8;
        }

        body.dark-mode .pagination .info strong {
            color: #f1f5f9;
        }

        body.dark-mode .pagination .buttons button {
            background: #0f172a;
            border-color: #334155;
            color: #94a3b8;
        }

        body.dark-mode .pagination .buttons button:hover:not(:disabled) {
            background: #1e293b;
            border-color: #818cf8;
            color: #818cf8;
        }

        body.dark-mode .pagination .buttons button.active {
            background: #818cf8;
            border-color: #818cf8;
            color: #0f172a;
        }

        body.dark-mode .empty-state h3 {
            color: #94a3b8;
        }

        body.dark-mode .empty-state p {
            color: #64748b;
        }

        body.dark-mode .cliente-card {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .cliente-card .nome {
            color: #f1f5f9;
        }

        body.dark-mode .cliente-card .info {
            color: #94a3b8;
        }

        body.dark-mode .cliente-card .nome .id {
            background: #334155;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div>
            <h2>👤 Gerenciar Clientes</h2>
            <p>Cadastre e gerencie seus clientes</p>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-primary" onclick="abrirModalCliente()">➕ Novo Cliente</button>
            <button class="btn btn-outline" onclick="carregarClientes()">🔄 Atualizar</button>
        </div>
    </div>

    <div class="page-content">
        <!-- BARRA DE BUSCA -->
        <div class="search-bar">
            <div class="search-input-wrapper">
                <i class="fas fa-search"></i>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="🔍 Buscar por nome, telefone, email ou documento..."
                    oninput="filtrarClientes()"
                >
            </div>
            <span class="search-stats" id="searchStats">
                <strong id="totalClientesDisplay">0</strong> clientes
            </span>
            <button class="btn-limpar-busca" id="btnLimparBusca" onclick="limparBusca()">
                ✕ Limpar
            </button>
        </div>

        <!-- TABELA DE CLIENTES -->
        <div class="table-container">
            <div class="table-scroll">
                <table class="clientes-table">
                    <thead>
                        <tr>
                            <th style="width: 30px;">#</th>
                            <th>Cliente</th>
                            <th>Contato</th>
                            <th>Documento</th>
                            <th style="text-align: right;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="clientesBody">
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 40px; color: #94a3b8;">
                                Carregando clientes...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- PAGINAÇÃO -->
            <div class="pagination" id="pagination">
                <div class="info">
                    Mostrando <strong id="paginaInicio">0</strong> - <strong id="paginaFim">0</strong> 
                    de <strong id="totalRegistros">0</strong> clientes
                </div>
                <div class="buttons" id="paginationButtons">
                    <button onclick="irPagina(1)" id="btnPrimeira">«</button>
                    <button onclick="paginaAnterior()" id="btnAnterior">‹</button>
                    <span id="paginasNumeros"></span>
                    <button onclick="proximaPagina()" id="btnProxima">›</button>
                    <button onclick="irPagina(totalPaginas)" id="btnUltima">»</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL CLIENTE -->
    <div class="modal modal-cliente" id="modalCliente">
        <div class="modal-content">
            <h2 id="modalClienteTitle">Novo Cliente</h2>
            <form id="clienteForm" onsubmit="salvarCliente(event)">
                <div class="form-group">
                    <label>Nome *</label>
                    <input type="text" id="formNome" required placeholder="Ex: João Silva">
                </div>
                <div class="form-group">
                    <label>Documento (CPF/CNPJ)</label>
                    <input type="text" id="formDocumento" placeholder="000.000.000-00" oninput="mascaraDocumento(this)">
                </div>
                <div class="form-group">
                    <label>Telefone *</label>
                    <input type="text" id="formTelefone" required placeholder="(11) 98765-4321" oninput="mascaraTelefone(this)">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="formEmail" placeholder="cliente@email.com">
                </div>
                <div class="form-group">
                    <label>Endereço</label>
                    <input type="text" id="formEndereco" placeholder="Rua, número, bairro, cidade/UF">
                </div>
                <div class="form-group">
                    <label>Observações</label>
                    <textarea id="formObservacoes" rows="2" placeholder="Informações adicionais..."></textarea>
                </div>
                <input type="hidden" id="formEditIndex" value="-1">
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="fecharModal('modalCliente')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============ CONFIGURAÇÕES ============
        const ITENS_POR_PAGINA = 15;

        // ============ ESTADO ============
        let clientesData = [];
        let clientesFiltrados = [];
        let paginaAtual = 1;
        let totalPaginas = 1;

        // ============ ACESSO AO DB ============
        function getDb() {
            try {
                if (window.parent && window.parent.getParentDb) {
                    return window.parent.getParentDb();
                }
                if (window.parent && window.parent.getDadosGlobais) {
                    return window.parent.getDadosGlobais().db;
                }
                if (window.db) {
                    return window.db;
                }
                throw new Error('Database não disponível');
            } catch (error) {
                console.error('Erro ao acessar database:', error);
                mostrarNotificacao('❌ Erro ao conectar ao banco de dados', 'error');
                return null;
            }
        }

        // ============ NOTIFICAÇÕES ============
        function mostrarNotificacao(mensagem, tipo = 'info') {
            const cores = {
                success: '#0b9e5e',
                error: '#dc2626',
                warning: '#f59e0b',
                info: '#4f46e5'
            };

            const icones = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };

            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${cores[tipo] || cores.info};
                color: white;
                padding: 12px 20px;
                border-radius: 12px;
                font-size: 14px;
                font-family: 'Inter', sans-serif;
                box-shadow: 0 8px 30px rgba(0,0,0,0.2);
                z-index: 9999;
                max-width: 400px;
                animation: slideIn 0.3s ease;
                display: flex;
                align-items: center;
                gap: 10px;
            `;
            
            toast.innerHTML = `<span>${icones[tipo] || 'ℹ️'}</span> ${mensagem}`;
            
            const existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();
            
            toast.className = 'toast-notification';
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ============ MÁSCARAS ============
        function mascaraTelefone(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length === 0) {
                input.value = '';
                return;
            }
            if (value.length <= 10) {
                value = value.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
            } else {
                value = value.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            }
            input.value = value;
        }

        function mascaraDocumento(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length === 0) {
                input.value = '';
                return;
            }
            if (value.length <= 11) {
                value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            } else {
                value = value.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
            }
            input.value = value;
        }

        // ============ CARREGAR CLIENTES ============
        async function carregarClientes() {
            try {
                const db = getDb();
                if (!db) {
                    throw new Error('Database não disponível');
                }

                clientesData = await db.getClientes();
                clientesFiltrados = [...clientesData];
                paginaAtual = 1;
                
                renderizarClientes();
                atualizarStats();
                
                const total = clientesData.length;
                const msg = total > 0 ? `✅ ${total} clientes carregados` : '📭 Nenhum cliente cadastrado';
                mostrarNotificacao(msg, total > 0 ? 'success' : 'info');
                
                if (window.parent && window.parent.atualizarStatus) {
                    window.parent.atualizarStatus(`✅ ${total} clientes carregados`);
                }
            } catch (error) {
                console.error('Erro ao carregar clientes:', error);
                mostrarNotificacao('❌ Erro ao carregar clientes: ' + error.message, 'error');
                if (window.parent && window.parent.atualizarStatus) {
                    window.parent.atualizarStatus('❌ Erro ao carregar clientes');
                }
            }
        }

        // ============ FILTRAR ============
        function filtrarClientes() {
            const termo = document.getElementById('searchInput').value.toLowerCase().trim();
            const btnLimpar = document.getElementById('btnLimparBusca');

            if (termo.length > 0) {
                btnLimpar.classList.add('visible');
            } else {
                btnLimpar.classList.remove('visible');
            }

            if (termo === '') {
                clientesFiltrados = [...clientesData];
            } else {
                clientesFiltrados = clientesData.filter(c => {
                    const nome = (c.nome || '').toLowerCase();
                    const telefone = (c.telefone || '').replace(/\D/g, '');
                    const email = (c.email || '').toLowerCase();
                    const documento = (c.documento || '').replace(/\D/g, '');
                    const termoLimpo = termo.replace(/\D/g, '');
                    
                    return nome.includes(termo) ||
                           telefone.includes(termoLimpo) ||
                           email.includes(termo) ||
                           documento.includes(termoLimpo) ||
                           (c.endereco && c.endereco.toLowerCase().includes(termo));
                });
            }

            paginaAtual = 1;
            renderizarClientes();
            atualizarStats();
        }

        function limparBusca() {
            document.getElementById('searchInput').value = '';
            document.getElementById('btnLimparBusca').classList.remove('visible');
            clientesFiltrados = [...clientesData];
            paginaAtual = 1;
            renderizarClientes();
            atualizarStats();
            document.getElementById('searchInput').focus();
        }

        // ============ RENDERIZAR ============
        function renderizarClientes() {
            const tbody = document.getElementById('clientesBody');
            const total = clientesFiltrados.length;
            totalPaginas = Math.ceil(total / ITENS_POR_PAGINA) || 1;

            if (paginaAtual > totalPaginas) paginaAtual = totalPaginas;

            const inicio = (paginaAtual - 1) * ITENS_POR_PAGINA;
            const fim = Math.min(inicio + ITENS_POR_PAGINA, total);
            const paginaClientes = clientesFiltrados.slice(inicio, fim);

            if (clientesFiltrados.length === 0) {
                const termo = document.getElementById('searchInput').value.trim();
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px; color: #94a3b8;">
                            <div style="font-size: 32px; margin-bottom: 8px;">🔍</div>
                            ${termo ? 'Nenhum cliente encontrado para "' + termo + '"' : 'Nenhum cliente cadastrado'}
                            <br><small style="color: #cbd5e1;">Clique em "Novo Cliente" para adicionar</small>
                        </td>
                    </tr>
                `;
                atualizarPaginacao();
                return;
            }

            tbody.innerHTML = paginaClientes.map((cliente, idx) => {
                const numero = inicio + idx + 1;
                return `
                    <tr>
                        <td style="color: #94a3b8; font-size: 13px;">${numero}</td>
                        <td>
                            <div class="cliente-nome">${cliente.nome || 'Sem nome'}</div>
                            <div class="cliente-info">
                                ${cliente.endereco ? `📍 ${cliente.endereco}` : ''}
                                ${cliente.observacoes ? `<br><span style="color: #94a3b8; font-size: 12px;">📝 ${cliente.observacoes}</span>` : ''}
                            </div>
                        </td>
                        <td>
                            <div class="cliente-info">
                                ${cliente.telefone ? `<div>📞 ${cliente.telefone}</div>` : ''}
                                ${cliente.email ? `<div>✉️ ${cliente.email}</div>` : ''}
                            </div>
                        </td>
                        <td>
                            ${cliente.documento ? `<span class="badge-documento">${cliente.documento}</span>` : '<span style="color: #94a3b8; font-size: 12px;">—</span>'}
                        </td>
                        <td>
                            <div class="acoes-cell">
                                <button class="btn btn-primary btn-sm" onclick="editarCliente('${cliente.id}')" title="Editar">
                                    ✏️ <span>Editar</span>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="excluirCliente('${cliente.id}')" title="Excluir">
                                    🗑️ <span>Excluir</span>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            atualizarPaginacao();
        }

        // ============ PAGINAÇÃO ============
        function atualizarPaginacao() {
            const total = clientesFiltrados.length;
            const inicio = (paginaAtual - 1) * ITENS_POR_PAGINA + 1;
            const fim = Math.min(paginaAtual * ITENS_POR_PAGINA, total);

            document.getElementById('paginaInicio').textContent = total > 0 ? inicio : 0;
            document.getElementById('paginaFim').textContent = fim;
            document.getElementById('totalRegistros').textContent = total;

            document.getElementById('btnPrimeira').disabled = paginaAtual <= 1;
            document.getElementById('btnAnterior').disabled = paginaAtual <= 1;
            document.getElementById('btnProxima').disabled = paginaAtual >= totalPaginas;
            document.getElementById('btnUltima').disabled = paginaAtual >= totalPaginas;

            // Números das páginas
            const container = document.getElementById('paginasNumeros');
            let html = '';
            const maxBotoes = 5;
            let inicioPaginas = Math.max(1, paginaAtual - Math.floor(maxBotoes / 2));
            let fimPaginas = Math.min(totalPaginas, inicioPaginas + maxBotoes - 1);
            
            if (fimPaginas - inicioPaginas < maxBotoes - 1) {
                inicioPaginas = Math.max(1, fimPaginas - maxBotoes + 1);
            }

            for (let i = inicioPaginas; i <= fimPaginas; i++) {
                const active = i === paginaAtual ? 'active' : '';
                html += `<button class="${active}" onclick="irPagina(${i})">${i}</button>`;
            }

            container.innerHTML = html;
        }

        function irPagina(num) {
            if (num < 1 || num > totalPaginas) return;
            paginaAtual = num;
            renderizarClientes();
            // Scroll para o topo da tabela
            document.querySelector('.table-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function paginaAnterior() {
            if (paginaAtual > 1) irPagina(paginaAtual - 1);
        }

        function proximaPagina() {
            if (paginaAtual < totalPaginas) irPagina(paginaAtual + 1);
        }

        function atualizarStats() {
            document.getElementById('totalClientesDisplay').textContent = clientesFiltrados.length;
        }

        // ============ MODAL ============
        function abrirModalCliente(data = null) {
            const modal = document.getElementById('modalCliente');
            document.getElementById('modalClienteTitle').textContent = data ? 'Editar Cliente' : 'Novo Cliente';

            if (data) {
                document.getElementById('formNome').value = data.nome || '';
                document.getElementById('formDocumento').value = data.documento || '';
                document.getElementById('formTelefone').value = data.telefone || '';
                document.getElementById('formEmail').value = data.email || '';
                document.getElementById('formEndereco').value = data.endereco || '';
                document.getElementById('formObservacoes').value = data.observacoes || '';
                document.getElementById('formEditIndex').value = data.id;
            } else {
                document.getElementById('formNome').value = '';
                document.getElementById('formDocumento').value = '';
                document.getElementById('formTelefone').value = '';
                document.getElementById('formEmail').value = '';
                document.getElementById('formEndereco').value = '';
                document.getElementById('formObservacoes').value = '';
                document.getElementById('formEditIndex').value = '-1';
            }

            modal.classList.add('active');
            // Foco no primeiro campo
            setTimeout(() => document.getElementById('formNome').focus(), 100);
        }

        function fecharModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // ============ SALVAR CLIENTE ============
        async function salvarCliente(event) {
            event.preventDefault();
            
            const data = {
                nome: document.getElementById('formNome').value.trim(),
                documento: document.getElementById('formDocumento').value.trim(),
                telefone: document.getElementById('formTelefone').value.trim(),
                email: document.getElementById('formEmail').value.trim(),
                endereco: document.getElementById('formEndereco').value.trim(),
                observacoes: document.getElementById('formObservacoes').value.trim(),
            };

            if (!data.nome) {
                mostrarNotificacao('⚠️ Nome é obrigatório!', 'warning');
                document.getElementById('formNome').focus();
                return;
            }

            if (!data.telefone) {
                mostrarNotificacao('⚠️ Telefone é obrigatório!', 'warning');
                document.getElementById('formTelefone').focus();
                return;
            }

            const telefoneLimpo = data.telefone.replace(/\D/g, '');
            if (telefoneLimpo.length < 10) {
                mostrarNotificacao('⚠️ Telefone inválido! Use (DDD) 9 9999-9999', 'warning');
                document.getElementById('formTelefone').focus();
                return;
            }

            if (data.email && !validarEmail(data.email)) {
                mostrarNotificacao('⚠️ E-mail inválido!', 'warning');
                document.getElementById('formEmail').focus();
                return;
            }

            try {
                const db = getDb();
                if (!db) {
                    throw new Error('Database não disponível');
                }

                const id = document.getElementById('formEditIndex').value;
                let mensagem = '';

                if (id && id !== '-1') {
                    data.id = id;
                    await db.salvarCliente(data);
                    mensagem = '✅ Cliente atualizado com sucesso!';
                } else {
                    await db.salvarCliente(data);
                    mensagem = '✅ Cliente criado com sucesso!';
                }

                mostrarNotificacao(mensagem, 'success');
                
                if (window.parent && window.parent.atualizarStatus) {
                    window.parent.atualizarStatus(mensagem);
                }

                fecharModal('modalCliente');
                await carregarClientes();
            } catch (error) {
                console.error('Erro ao salvar cliente:', error);
                mostrarNotificacao('❌ Erro ao salvar: ' + error.message, 'error');
                if (window.parent && window.parent.atualizarStatus) {
                    window.parent.atualizarStatus('❌ Erro ao salvar cliente');
                }
            }
        }

        // ============ VALIDAR E-MAIL ============
        function validarEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ============ EDITAR ============
        function editarCliente(id) {
            const cliente = clientesData.find(c => c.id === id);
            if (cliente) {
                abrirModalCliente(cliente);
            } else {
                mostrarNotificacao('❌ Cliente não encontrado', 'error');
            }
        }

        // ============ EXCLUIR ============
        async function excluirCliente(id) {
            if (!confirm('Tem certeza que deseja excluir este cliente?')) return;
            
            try {
                const db = getDb();
                if (!db) {
                    throw new Error('Database não disponível');
                }

                await db.deletarCliente(id);
                mostrarNotificacao('🗑️ Cliente excluído com sucesso!', 'success');
                
                if (window.parent && window.parent.atualizarStatus) {
                    window.parent.atualizarStatus('🗑️ Cliente excluído');
                }

                await carregarClientes();
            } catch (error) {
                console.error('Erro ao excluir cliente:', error);
                mostrarNotificacao('❌ Erro ao excluir: ' + error.message, 'error');
                if (window.parent && window.parent.atualizarStatus) {
                    window.parent.atualizarStatus('❌ Erro ao excluir cliente');
                }
            }
        }

        // ============ INICIALIZAR ============
        document.addEventListener('DOMContentLoaded', function() {
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
            }

            carregarClientes();

            // Fechar modal com ESC
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal.active').forEach(modal => {
                        modal.classList.remove('active');
                    });
                }
            });

            // Fechar modal ao clicar fora
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('modal')) {
                    e.target.classList.remove('active');
                }
            });
        });

        // ============ TOAST ANIMATION ============
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateX(30px);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
