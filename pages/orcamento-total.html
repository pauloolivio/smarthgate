<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento Total</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* ===== HEADER ===== */
        .page-header {
            padding: 16px 24px;
            background: #f8fafc;
            border-bottom: 2px solid #e9edf2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .page-header h2 {
            color: #0f172a;
        }

        .page-header p {
            color: #64748b;
            font-size: 14px;
        }

        .page-content {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(100vh - 180px);
        }

        /* ===== FILTROS ===== */
        .filtros-bar {
            background: #ffffff;
            border: 1px solid #e9edf2;
            border-radius: 12px;
            padding: 14px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .filtros-bar .filtro-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filtros-bar .filtro-group label {
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
        }

        .filtros-bar .filtro-group select,
        .filtros-bar .filtro-group input {
            padding: 6px 12px;
            border: 1.5px solid #d1d9e6;
            border-radius: 8px;
            font-size: 13px;
            background: #fafbfc;
            transition: border-color 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .filtros-bar .filtro-group select:focus,
        .filtros-bar .filtro-group input:focus {
            outline: none;
            border-color: #4f46e5;
            background: white;
        }

        .filtros-bar .filtro-group .btn-filtro-status {
            padding: 4px 14px;
            border: 1.5px solid #d1d9e6;
            border-radius: 20px;
            font-size: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            color: #64748b;
        }

        .filtros-bar .filtro-group .btn-filtro-status:hover {
            background: #f1f5f9;
        }

        .filtros-bar .filtro-group .btn-filtro-status.active {
            background: #4f46e5;
            border-color: #4f46e5;
            color: white;
        }

        .filtros-bar .filtro-group .btn-filtro-status.active.pendente { background: #f59e0b; border-color: #f59e0b; }
        .filtros-bar .filtro-group .btn-filtro-status.active.aprovado { background: #0b9e5e; border-color: #0b9e5e; }
        .filtros-bar .filtro-group .btn-filtro-status.active.finalizado { background: #4f46e5; border-color: #4f46e5; }
        .filtros-bar .filtro-group .btn-filtro-status.active.cancelado { background: #dc2626; border-color: #dc2626; }

        .filtros-bar .search-input-wrapper {
            flex: 1;
            min-width: 180px;
            position: relative;
        }

        .filtros-bar .search-input-wrapper input {
            width: 100%;
            padding: 6px 12px 6px 32px;
            border: 1.5px solid #d1d9e6;
            border-radius: 8px;
            font-size: 13px;
            background: #fafbfc;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .filtros-bar .search-input-wrapper input:focus {
            outline: none;
            border-color: #4f46e5;
            background: white;
        }

        .filtros-bar .search-input-wrapper .icone-busca {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
        }

        .filtros-bar .stats {
            font-size: 13px;
            color: #64748b;
            white-space: nowrap;
            padding: 4px 12px;
            background: #f1f5f9;
            border-radius: 20px;
        }

        .filtros-bar .stats strong {
            color: #0f172a;
        }

        /* ===== TABELA ===== */
        .table-container {
            background: #ffffff;
            border: 1px solid #e9edf2;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .orcamentos-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .orcamentos-table thead {
            background: #f8fafc;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .orcamentos-table th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #475569;
            border-bottom: 2px solid #e9edf2;
            white-space: nowrap;
        }

        .orcamentos-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
            color: #0f172a;
        }

        .orcamentos-table tbody tr {
            transition: background 0.15s;
        }

        .orcamentos-table tbody tr:hover {
            background: #f8fafc;
        }

        .orcamentos-table tbody tr:last-child td {
            border-bottom: none;
        }

        .orcamentos-table .cliente-nome {
            font-weight: 600;
            color: #0f172a;
        }

        .orcamentos-table .cliente-info {
            font-size: 12px;
            color: #94a3b8;
        }

        .orcamentos-table .valor-total {
            font-weight: 700;
            color: #4f46e5;
            font-size: 15px;
        }

        .orcamentos-table .badge-status {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-status.pendente { background: #fef3c7; color: #92400e; }
        .badge-status.aprovado { background: #d1fae5; color: #065f46; }
        .badge-status.finalizado { background: #e0e7ff; color: #3730a3; }
        .badge-status.cancelado { background: #fee2e2; color: #991b1b; }

        .orcamentos-table .acoes-cell {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .orcamentos-table .acoes-cell .btn {
            padding: 4px 10px;
            font-size: 11px;
            white-space: nowrap;
        }

        .btn-aprovar {
            background: #0b9e5e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            padding: 4px 10px;
            font-size: 11px;
        }

        .btn-aprovar:hover {
            background: #0a8a4f;
            transform: translateY(-1px);
        }

        .btn-finalizar {
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            padding: 4px 10px;
            font-size: 11px;
        }

        .btn-finalizar:hover {
            background: #4338ca;
            transform: translateY(-1px);
        }

        .btn-cancelar {
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            padding: 4px 10px;
            font-size: 11px;
        }

        .btn-cancelar:hover {
            background: #b91c1c;
            transform: translateY(-1px);
        }

        .btn-ver {
            background: #f1f5f9;
            color: #475569;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            padding: 4px 10px;
            font-size: 11px;
        }

        .btn-ver:hover {
            background: #e2e8f0;
        }

        .btn-reabrir {
            border: 1px solid #f59e0b;
            color: #f59e0b;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            padding: 4px 10px;
            font-size: 11px;
        }

        .btn-reabrir:hover {
            background: #fef3c7;
        }

        .orcamentos-table .comodos-info {
            font-size: 12px;
            color: #94a3b8;
        }

        .orcamentos-table .comodos-info span {
            background: #f1f5f9;
            padding: 1px 8px;
            border-radius: 10px;
            margin-right: 4px;
        }

        /* ===== LOADING SPINNER ===== */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e9edf2;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== PAGINAÇÃO ===== */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-top: 1px solid #e9edf2;
            flex-wrap: wrap;
            gap: 12px;
        }

        .pagination .info {
            font-size: 13px;
            color: #64748b;
        }

        .pagination .info strong {
            color: #0f172a;
        }

        .pagination .buttons {
            display: flex;
            gap: 6px;
        }

        .pagination .buttons button {
            padding: 6px 14px;
            border: 1px solid #d1d9e6;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .pagination .buttons button:hover:not(:disabled) {
            background: #f8fafc;
            border-color: #4f46e5;
            color: #4f46e5;
        }

        .pagination .buttons button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination .buttons button.active {
            background: #4f46e5;
            border-color: #4f46e5;
            color: white;
        }

        .pagination .buttons button.active:hover {
            background: #4338ca;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .empty-state .icone {
            font-size: 48px;
            opacity: 0.5;
            margin-bottom: 12px;
        }

        .empty-state h3 {
            color: #475569;
            margin-bottom: 4px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            padding: 12px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            color: white;
            max-width: 380px;
            animation: toastIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(30px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ===== DARK MODE ===== */
        body.dark-mode .page-header {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .page-header h2 {
            color: #f1f5f9;
        }

        body.dark-mode .filtros-bar {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .filtros-bar .filtro-group label {
            color: #94a3b8;
        }

        body.dark-mode .filtros-bar .filtro-group select,
        body.dark-mode .filtros-bar .filtro-group input,
        body.dark-mode .filtros-bar .search-input-wrapper input {
            background: #0f172a;
            border-color: #334155;
            color: #f1f5f9;
        }

        body.dark-mode .filtros-bar .filtro-group select:focus,
        body.dark-mode .filtros-bar .filtro-group input:focus,
        body.dark-mode .filtros-bar .search-input-wrapper input:focus {
            border-color: #818cf8;
            background: #0f172a;
        }

        body.dark-mode .filtros-bar .filtro-group .btn-filtro-status {
            background: #0f172a;
            border-color: #334155;
            color: #94a3b8;
        }

        body.dark-mode .filtros-bar .filtro-group .btn-filtro-status:hover {
            background: #1e293b;
        }

        body.dark-mode .filtros-bar .stats {
            background: #334155;
            color: #94a3b8;
        }

        body.dark-mode .filtros-bar .stats strong {
            color: #f1f5f9;
        }

        body.dark-mode .table-container {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .orcamentos-table thead {
            background: #0f172a;
        }

        body.dark-mode .orcamentos-table th {
            color: #94a3b8;
            border-color: #334155;
        }

        body.dark-mode .orcamentos-table td {
            color: #f1f5f9;
            border-color: #334155;
        }

        body.dark-mode .orcamentos-table tbody tr:hover {
            background: #0f172a;
        }

        body.dark-mode .orcamentos-table .cliente-nome {
            color: #f1f5f9;
        }

        body.dark-mode .orcamentos-table .cliente-info {
            color: #94a3b8;
        }

        body.dark-mode .orcamentos-table .valor-total {
            color: #818cf8;
        }

        body.dark-mode .orcamentos-table .comodos-info span {
            background: #334155;
            color: #94a3b8;
        }

        body.dark-mode .badge-status.pendente {
            background: #92400e;
            color: #fef3c7;
        }

        body.dark-mode .badge-status.aprovado {
            background: #065f46;
            color: #d1fae5;
        }

        body.dark-mode .badge-status.finalizado {
            background: #3730a3;
            color: #e0e7ff;
        }

        body.dark-mode .badge-status.cancelado {
            background: #991b1b;
            color: #fee2e2;
        }

        body.dark-mode .btn-ver {
            background: #334155;
            color: #94a3b8;
        }

        body.dark-mode .btn-ver:hover {
            background: #475569;
        }

        body.dark-mode .btn-reabrir {
            border-color: #f59e0b;
            color: #fbbf24;
        }

        body.dark-mode .btn-reabrir:hover {
            background: #92400e;
        }

        body.dark-mode .pagination {
            border-color: #334155;
        }

        body.dark-mode .pagination .info {
            color: #94a3b8;
        }

        body.dark-mode .pagination .info strong {
            color: #f1f5f9;
        }

        body.dark-mode .pagination .buttons button {
            background: #0f172a;
            border-color: #334155;
            color: #94a3b8;
        }

        body.dark-mode .pagination .buttons button:hover:not(:disabled) {
            background: #1e293b;
            border-color: #818cf8;
            color: #818cf8;
        }

        body.dark-mode .pagination .buttons button.active {
            background: #818cf8;
            border-color: #818cf8;
            color: #0f172a;
        }

        body.dark-mode .empty-state h3 {
            color: #94a3b8;
        }

        body.dark-mode .empty-state p {
            color: #64748b;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 768px) {
            .page-content {
                padding: 12px;
            }

            .filtros-bar {
                flex-direction: column;
                align-items: stretch;
                padding: 12px 16px;
            }

            .filtros-bar .filtro-group {
                flex-wrap: wrap;
            }

            .filtros-bar .search-input-wrapper {
                min-width: 100%;
            }

            .orcamentos-table th,
            .orcamentos-table td {
                padding: 8px 12px;
                font-size: 13px;
            }

            .orcamentos-table .acoes-cell .btn span {
                display: none;
            }

            .orcamentos-table .acoes-cell .btn {
                padding: 4px 8px;
                font-size: 12px;
            }

            .pagination {
                flex-direction: column;
                align-items: center;
            }

            .pagination .buttons {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .orcamentos-table th:nth-child(3),
            .orcamentos-table td:nth-child(3) {
                display: none;
            }

            .orcamentos-table th:nth-child(5),
            .orcamentos-table td:nth-child(5) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="page-header">
        <div>
            <h2>📋 Orçamento Total</h2>
            <p>Gerencie todos os orçamentos dos clientes</p>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-primary" onclick="carregarOrcamentos()">🔄 Atualizar</button>
            <button class="btn btn-success" onclick="exportarRelatorio()">📊 Exportar Relatório</button>
        </div>
    </div>

    <div class="page-content">
        <!-- FILTROS -->
        <div class="filtros-bar">
            <div class="filtro-group">
                <label>Status:</label>
                <button class="btn-filtro-status active" data-status="todos" onclick="filtrarPorStatus('todos')">Todos</button>
                <button class="btn-filtro-status" data-status="pendente" onclick="filtrarPorStatus('pendente')">⏳ Pendentes</button>
                <button class="btn-filtro-status" data-status="aprovado" onclick="filtrarPorStatus('aprovado')">✅ Aprovados</button>
                <button class="btn-filtro-status" data-status="finalizado" onclick="filtrarPorStatus('finalizado')">🔵 Finalizados</button>
                <button class="btn-filtro-status" data-status="cancelado" onclick="filtrarPorStatus('cancelado')">❌ Cancelados</button>
            </div>

            <div class="search-input-wrapper">
                <span class="icone-busca">🔍</span>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Buscar cliente..."
                    oninput="filtrarOrcamentos()"
                >
            </div>

            <span class="stats" id="stats">
                <strong id="totalOrcamentosDisplay">0</strong> orçamentos
            </span>
        </div>

        <!-- TABELA -->
        <div class="table-container">
            <div class="table-scroll">
                <table class="orcamentos-table">
                    <thead>
                        <tr>
                            <th style="width:30px;">#</th>
                            <th>Cliente</th>
                            <th>Contato</th>
                            <th style="text-align:center;">Cômodos</th>
                            <th style="text-align:center;">Itens</th>
                            <th style="text-align:right;">Valor Total</th>
                            <th style="text-align:center;">Status</th>
                            <th style="text-align:center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="orcamentosBody">
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 40px; color: #94a3b8;">
                                <span class="loading-spinner"></span> Carregando orçamentos...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- PAGINAÇÃO -->
            <div class="pagination" id="pagination">
                <div class="info">
                    Mostrando <strong id="paginaInicio">0</strong> - <strong id="paginaFim">0</strong> 
                    de <strong id="totalRegistros">0</strong> orçamentos
                </div>
                <div class="buttons" id="paginationButtons">
                    <button onclick="irPagina(1)" id="btnPrimeira">«</button>
                    <button onclick="paginaAnterior()" id="btnAnterior">‹</button>
                    <span id="paginasNumeros"></span>
                    <button onclick="proximaPagina()" id="btnProxima">›</button>
                    <button onclick="irPagina(totalPaginas)" id="btnUltima">»</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        //  CONFIGURAÇÕES
        // =============================================
        const ITENS_POR_PAGINA = 15;

        // =============================================
        //  ESTADO
        // =============================================
        let orcamentosData = [];
        let orcamentosFiltrados = [];
        let paginaAtual = 1;
        let totalPaginas = 1;
        let filtroStatusAtual = 'todos';

        // =============================================
        //  ACESSO AO DB
        // =============================================
        function getDb() {
            try {
                if (window.parent && window.parent.getParentDb) {
                    return window.parent.getParentDb();
                }
                if (window.parent && window.parent.getDadosGlobais) {
                    return window.parent.getDadosGlobais().db;
                }
                if (window.db) {
                    return window.db;
                }
                throw new Error('Database não disponível');
            } catch (error) {
                console.error('Erro ao acessar database:', error);
                mostrarNotificacao('❌ Erro ao conectar ao banco de dados', 'error');
                return null;
            }
        }

        // =============================================
        //  TOAST / NOTIFICAÇÕES
        // =============================================
        function mostrarNotificacao(mensagem, tipo = 'info') {
            const cores = {
                success: '#0b9e5e',
                error: '#dc2626',
                warning: '#f59e0b',
                info: '#4f46e5'
            };

            const icones = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };

            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${cores[tipo] || cores.info};
                color: white;
                padding: 12px 20px;
                border-radius: 12px;
                font-size: 14px;
                font-family: 'Inter', sans-serif;
                box-shadow: 0 8px 30px rgba(0,0,0,0.2);
                z-index: 9999;
                max-width: 400px;
                animation: toastIn 0.3s ease;
                display: flex;
                align-items: center;
                gap: 10px;
            `;
            
            toast.innerHTML = `<span>${icones[tipo] || 'ℹ️'}</span> ${mensagem}`;
            
            const existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();
            
            toast.className = 'toast-notification';
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // =============================================
        //  FORMATADORES
        // =============================================
        function fmtBRL(v) {
            return 'R$ ' + Number(v || 0).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        function getStatusLabel(status) {
            const labels = {
                'pendente': '⏳ Pendente',
                'aprovado': '✅ Aprovado',
                'finalizado': '🔵 Finalizado',
                'cancelado': '❌ Cancelado'
            };
            return labels[status] || status || 'Pendente';
        }

        function getStatusClass(status) {
            const classes = {
                'pendente': 'pendente',
                'aprovado': 'aprovado',
                'finalizado': 'finalizado',
                'cancelado': 'cancelado'
            };
            return classes[status] || 'pendente';
        }

        // =============================================
        //  CARREGAR ORÇAMENTOS
        // =============================================
        async function carregarOrcamentos() {
            try {
                const db = getDb();
                if (!db) {
                    throw new Error('Database não disponível');
                }

                // Buscar clientes
                const clientes = await db.getClientes();
                
                // Buscar status de todos os clientes (com fallback)
                let statusData = {};
                try {
                    // Tentar usar o método otimizado
                    if (typeof db.getTodosStatusOrcamentos === 'function') {
                        statusData = await db.getTodosStatusOrcamentos();
                        console.log('📊 Status carregados via getTodosStatusOrcamentos');
                    } else if (typeof db.getTodosStatus === 'function') {
                        statusData = await db.getTodosStatus();
                        console.log('📊 Status carregados via getTodosStatus');
                    } else {
                        // Fallback: buscar individualmente
                        console.log('📊 Buscando status individualmente (fallback)');
                        for (const cliente of clientes) {
                            const status = await db.getOrcamentoStatus(cliente.id);
                            if (status && status.status) {
                                statusData[cliente.id] = status;
                            }
                        }
                    }
                } catch (error) {
                    console.warn('⚠️ Erro ao buscar status em lote, usando fallback individual:', error);
                    // Fallback: buscar individualmente
                    for (const cliente of clientes) {
                        try {
                            const status = await db.getOrcamentoStatus(cliente.id);
                            if (status && status.status) {
                                statusData[cliente.id] = status;
                            }
                        } catch (e) {
                            // Ignorar erro individual
                        }
                    }
                }
                
                const orcamentos = [];

                for (const cliente of clientes) {
                    // Buscar orçamento por cômodo
                    const data = await db.getOrcamentoComodo(cliente.id);
                    
                    if (data && Object.keys(data).length > 0) {
                        let total = 0;
                        let itens = 0;
                        const comodosSet = new Set();

                        Object.values(data).forEach(entry => {
                            if (entry && entry.qtd > 0) {
                                total += (entry.qtd || 0) * (entry.preco || 0);
                                itens += entry.qtd || 0;
                                if (entry.comodo) comodosSet.add(entry.comodo);
                            }
                        });

                        // Buscar status (do cache ou fallback)
                        let status = 'pendente';
                        if (statusData && statusData[cliente.id] && statusData[cliente.id].status) {
                            status = statusData[cliente.id].status;
                        }

                        // Se tem itens, adicionar à lista
                        if (itens > 0) {
                            orcamentos.push({
                                clienteId: cliente.id,
                                clienteNome: cliente.nome || 'Cliente sem nome',
                                telefone: cliente.telefone || '',
                                email: cliente.email || '',
                                documento: cliente.documento || '',
                                valorTotal: total,
                                itens: itens,
                                comodos: comodosSet.size,
                                comodosList: [...comodosSet],
                                status: status,
                                dataCriacao: new Date().toISOString(),
                                dataAtualizacao: new Date().toISOString()
                            });
                        }
                    }
                }

                // Ordenar por data de criação (mais recentes primeiro)
                orcamentos.sort((a, b) => new Date(b.dataCriacao) - new Date(a.dataCriacao));
                
                orcamentosData = orcamentos;
                orcamentosFiltrados = [...orcamentosData];
                paginaAtual = 1;
                
                aplicarFiltroStatus();
                
                const msg = orcamentos.length > 0 ? `✅ ${orcamentos.length} orçamentos carregados` : '📋 Nenhum orçamento encontrado';
                mostrarNotificacao(msg, orcamentos.length > 0 ? 'success' : 'info');
                
                if (window.parent && window.parent.atualizarStatus) {
                    window.parent.atualizarStatus(`✅ ${orcamentos.length} orçamentos carregados`);
                }

            } catch (error) {
                console.error('❌ Erro ao carregar orçamentos:', error);
                mostrarNotificacao('❌ Erro ao carregar orçamentos: ' + error.message, 'error');
                
                const tbody = document.getElementById('orcamentosBody');
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align: center; padding: 40px; color: #dc2626;">
                            ❌ Erro ao carregar: ${error.message}
                            <br><small style="color: #94a3b8;">Verifique o console para mais detalhes</small>
                        </td>
                    </tr>
                `;
            }
        }

        // =============================================
        //  FILTRAR
        // =============================================
        function filtrarPorStatus(status) {
            filtroStatusAtual = status;
            
            // Atualizar botões
            document.querySelectorAll('.btn-filtro-status').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.status === status);
            });

            aplicarFiltroStatus();
        }

        function aplicarFiltroStatus() {
            let filtrados = [...orcamentosData];

            if (filtroStatusAtual !== 'todos') {
                filtrados = filtrados.filter(o => o.status === filtroStatusAtual);
            }

            // Aplicar busca
            const termo = document.getElementById('searchInput').value.toLowerCase().trim();
            if (termo) {
                filtrados = filtrados.filter(o => 
                    o.clienteNome.toLowerCase().includes(termo) ||
                    (o.telefone && o.telefone.includes(termo)) ||
                    (o.email && o.email.toLowerCase().includes(termo))
                );
            }

            orcamentosFiltrados = filtrados;
            paginaAtual = 1;
            renderizarOrcamentos();
            atualizarStats();
        }

        function filtrarOrcamentos() {
            aplicarFiltroStatus();
        }

        // =============================================
        //  RENDERIZAR
        // =============================================
        function renderizarOrcamentos() {
            const tbody = document.getElementById('orcamentosBody');
            const total = orcamentosFiltrados.length;
            totalPaginas = Math.ceil(total / ITENS_POR_PAGINA) || 1;

            if (paginaAtual > totalPaginas) paginaAtual = totalPaginas;

            const inicio = (paginaAtual - 1) * ITENS_POR_PAGINA;
            const fim = Math.min(inicio + ITENS_POR_PAGINA, total);
            const paginaOrcamentos = orcamentosFiltrados.slice(inicio, fim);

            if (orcamentosFiltrados.length === 0) {
                const termo = document.getElementById('searchInput').value.trim();
                const statusMsg = filtroStatusAtual !== 'todos' ? ` com status "${filtroStatusAtual}"` : '';
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align: center; padding: 40px; color: #94a3b8;">
                            <div style="font-size: 32px; margin-bottom: 8px;">📋</div>
                            ${termo ? `Nenhum orçamento encontrado para "${termo}"` : `Nenhum orçamento${statusMsg} encontrado`}
                            <br><small style="color: #cbd5e1;">Crie um orçamento na página "Orçamento por Cômodo"</small>
                        </td>
                    </tr>
                `;
                atualizarPaginacao();
                return;
            }

            tbody.innerHTML = paginaOrcamentos.map((orc, idx) => {
                const numero = inicio + idx + 1;
                const statusClass = getStatusClass(orc.status);
                const statusLabel = getStatusLabel(orc.status);
                
                // Botões de ação baseados no status
                let botoes = '';
                
                if (orc.status === 'pendente') {
                    botoes = `
                        <button class="btn-aprovar" onclick="alterarStatus('${orc.clienteId}', 'aprovado')" title="Aprovar">
                            ✅ <span>Aprovar</span>
                        </button>
                        <button class="btn-cancelar" onclick="alterarStatus('${orc.clienteId}', 'cancelado')" title="Cancelar">
                            ❌ <span>Cancelar</span>
                        </button>
                    `;
                } else if (orc.status === 'aprovado') {
                    botoes = `
                        <button class="btn-finalizar" onclick="alterarStatus('${orc.clienteId}', 'finalizado')" title="Finalizar">
                            🔵 <span>Finalizar</span>
                        </button>
                        <button class="btn-cancelar" onclick="alterarStatus('${orc.clienteId}', 'cancelado')" title="Cancelar">
                            ❌ <span>Cancelar</span>
                        </button>
                    `;
                } else if (orc.status === 'finalizado' || orc.status === 'cancelado') {
                    botoes = `
                        <button class="btn-ver" onclick="verOrcamento('${orc.clienteId}')" title="Ver">
                            👁️ <span>Ver</span>
                        </button>
                        <button class="btn-reabrir" onclick="reabrirOrcamento('${orc.clienteId}')" title="Reabrir">
                            🔄 <span>Reabrir</span>
                        </button>
                    `;
                }

                return `
                    <tr>
                        <td style="color: #94a3b8; font-size: 13px;">${numero}</td>
                        <td>
                            <div class="cliente-nome">${orc.clienteNome}</div>
                            <div class="cliente-info">${orc.documento ? `📄 ${orc.documento}` : ''}</div>
                        </td>
                        <td>
                            <div class="cliente-info">
                                ${orc.telefone ? `📞 ${orc.telefone}` : ''}
                                ${orc.email ? `<br>✉️ ${orc.email}` : ''}
                            </div>
                        </td>
                        <td style="text-align:center;">
                            <div class="comodos-info">
                                <span>🏠 ${orc.comodos || 0}</span>
                            </div>
                        </td>
                        <td style="text-align:center;">
                            <span style="font-weight:500;">${orc.itens || 0}</span>
                        </td>
                        <td style="text-align:right;">
                            <span class="valor-total">${fmtBRL(orc.valorTotal || 0)}</span>
                        </td>
                        <td style="text-align:center;">
                            <span class="badge-status ${statusClass}">${statusLabel}</span>
                        </td>
                        <td>
                            <div class="acoes-cell">
                                ${botoes}
                                <button class="btn-ver" onclick="verOrcamento('${orc.clienteId}')" title="Ver detalhes">
                                    👁️ <span>Detalhes</span>
                                </button>
                                <button class="btn btn-outline btn-sm" onclick="imprimirOrcamento('${orc.clienteId}')" title="Imprimir" style="border:1px solid #4f46e5;color:#4f46e5;background:transparent;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;">
                                    🖨️ <span>Imprimir</span>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            atualizarPaginacao();
        }

        // =============================================
        //  PAGINAÇÃO
        // =============================================
        function atualizarPaginacao() {
            const total = orcamentosFiltrados.length;
            const inicio = (paginaAtual - 1) * ITENS_POR_PAGINA + 1;
            const fim = Math.min(paginaAtual * ITENS_POR_PAGINA, total);

            document.getElementById('paginaInicio').textContent = total > 0 ? inicio : 0;
            document.getElementById('paginaFim').textContent = fim;
            document.getElementById('totalRegistros').textContent = total;

            document.getElementById('btnPrimeira').disabled = paginaAtual <= 1;
            document.getElementById('btnAnterior').disabled = paginaAtual <= 1;
            document.getElementById('btnProxima').disabled = paginaAtual >= totalPaginas;
            document.getElementById('btnUltima').disabled = paginaAtual >= totalPaginas;

            const container = document.getElementById('paginasNumeros');
            let html = '';
            const maxBotoes = 5;
            let inicioPaginas = Math.max(1, paginaAtual - Math.floor(maxBotoes / 2));
            let fimPaginas = Math.min(totalPaginas, inicioPaginas + maxBotoes - 1);
            
            if (fimPaginas - inicioPaginas < maxBotoes - 1) {
                inicioPaginas = Math.max(1, fimPaginas - maxBotoes + 1);
            }

            for (let i = inicioPaginas; i <= fimPaginas; i++) {
                const active = i === paginaAtual ? 'active' : '';
                html += `<button class="${active}" onclick="irPagina(${i})">${i}</button>`;
            }

            container.innerHTML = html;
        }

        function irPagina(num) {
            if (num < 1 || num > totalPaginas) return;
            paginaAtual = num;
            renderizarOrcamentos();
            document.querySelector('.table-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function paginaAnterior() {
            if (paginaAtual > 1) irPagina(paginaAtual - 1);
        }

        function proximaPagina() {
            if (paginaAtual < totalPaginas) irPagina(paginaAtual + 1);
        }

        function atualizarStats() {
            document.getElementById('totalOrcamentosDisplay').textContent = orcamentosFiltrados.length;
        }

        // =============================================
        //  AÇÕES - ALTERAR STATUS
        // =============================================
        async function alterarStatus(clienteId, novoStatus) {
            const statusLabels = {
                'aprovado': 'aprovar',
                'finalizado': 'finalizar',
                'cancelado': 'cancelar'
            };
            
            const confirmMsg = {
                'aprovado': 'Tem certeza que deseja APROVAR este orçamento?',
                'finalizado': 'Tem certeza que deseja FINALIZAR este orçamento?',
                'cancelado': 'Tem certeza que deseja CANCELAR este orçamento?'
            };

            if (!confirm(confirmMsg[novoStatus] || 'Confirmar alteração de status?')) return;

            try {
                const db = getDb();
                if (!db) throw new Error('Database não disponível');

                await db.salvarOrcamentoStatus(clienteId, {
                    status: novoStatus,
                    dataAtualizacao: new Date().toISOString()
                });

                // Atualizar no array local
                const orc = orcamentosData.find(o => o.clienteId === clienteId);
                if (orc) orc.status = novoStatus;

                const orcFiltrado = orcamentosFiltrados.find(o => o.clienteId === clienteId);
                if (orcFiltrado) orcFiltrado.status = novoStatus;

                renderizarOrcamentos();
                mostrarNotificacao(`✅ Orçamento ${statusLabels[novoStatus] || 'atualizado'} com sucesso!`, 'success');

                if (window.parent && window.parent.atualizarStatus) {
                    window.parent.atualizarStatus(`✅ Orçamento ${statusLabels[novoStatus] || 'atualizado'}`);
                }

            } catch (error) {
                console.error('❌ Erro ao alterar status:', error);
                mostrarNotificacao('❌ Erro ao alterar status: ' + error.message, 'error');
            }
        }

        async function reabrirOrcamento(clienteId) {
            if (!confirm('Tem certeza que deseja REABRIR este orçamento? O status voltará para "Pendente".')) return;

            try {
                const db = getDb();
                if (!db) throw new Error('Database não disponível');

                await db.salvarOrcamentoStatus(clienteId, {
                    status: 'pendente',
                    dataAtualizacao: new Date().toISOString()
                });

                const orc = orcamentosData.find(o => o.clienteId === clienteId);
                if (orc) orc.status = 'pendente';

                const orcFiltrado = orcamentosFiltrados.find(o => o.clienteId === clienteId);
                if (orcFiltrado) orcFiltrado.status = 'pendente';

                renderizarOrcamentos();
                mostrarNotificacao('🔄 Orçamento reaberto como Pendente!', 'success');

            } catch (error) {
                console.error('❌ Erro ao reabrir orçamento:', error);
                mostrarNotificacao('❌ Erro ao reabrir: ' + error.message, 'error');
            }
        }

        // =============================================
        //  VER ORÇAMENTO
        // =============================================
        function verOrcamento(clienteId) {
            if (window.parent && window.parent.navegarPara) {
                sessionStorage.setItem('clienteSelecionado', clienteId);
                window.parent.navegarPara('orcamento-comodo');
            } else {
                window.location.href = 'orcamento-comodo.html?cliente=' + clienteId;
            }
        }

        // =============================================
        //  IMPRIMIR ORÇAMENTO
        // =============================================
        async function imprimirOrcamento(clienteId) {
            try {
                const db = getDb();
                if (!db) throw new Error('Database não disponível');

                const cliente = await db.getClientePorId(clienteId);
                if (!cliente) {
                    mostrarNotificacao('❌ Cliente não encontrado', 'error');
                    return;
                }

                const data = await db.getOrcamentoComodo(clienteId);
                if (!data || Object.keys(data).length === 0) {
                    mostrarNotificacao('⚠️ Este cliente não possui itens no orçamento', 'warning');
                    return;
                }

                const itens = Object.values(data).filter(e => e && e.qtd > 0);
                if (itens.length === 0) {
                    mostrarNotificacao('⚠️ Este cliente não possui itens no orçamento', 'warning');
                    return;
                }

                const statusData = await db.getOrcamentoStatus(clienteId);
                const status = statusData ? statusData.status : 'pendente';

                const dados = {
                    id: 'ORC-' + Date.now().toString(36).toUpperCase(),
                    numero: 'ORC-' + Date.now().toString(36).toUpperCase(),
                    cliente: cliente,
                    vendedor: sessionStorage.getItem('userEmail') || 'Não informado',
                    status: status,
                    dataCriacao: new Date().toISOString(),
                    valorTotal: itens.reduce((s, e) => s + (e.qtd || 0) * (e.preco || 0), 0),
                    produtos: itens.map(e => ({ ...e })),
                    empresaNome: 'SmartHome Automação',
                    empresaSub: 'Projetos e instalação de automação residencial',
                    condicoes: {
                        validade: '30 dias',
                        pagamento: '50% entrada + 50% na entrega',
                        garantia: '12 meses',
                        prazo: '15 dias úteis',
                        observacao: 'Valores sujeitos a alteração conforme cotação do dia'
                    },
                    observacoes: ''
                };

                localStorage.setItem('orcamentoParaImprimir', JSON.stringify(dados));

                if (window.parent && window.parent.abrirImpressaoComDados) {
                    window.parent.abrirImpressaoComDados(dados);
                } else {
                    window.open('../pages/orcamento-print.html', '_blank');
                }
                mostrarNotificacao('🖨️ Abrindo impressão...', 'info');

            } catch (error) {
                console.error('❌ Erro ao imprimir:', error);
                mostrarNotificacao('❌ Erro ao imprimir: ' + error.message, 'error');
            }
        }

        // =============================================
        //  EXPORTAR RELATÓRIO
        // =============================================
        function exportarRelatorio() {
            if (orcamentosFiltrados.length === 0) {
                mostrarNotificacao('⚠️ Nenhum orçamento para exportar', 'warning');
                return;
            }

            let html = `<html><head><meta charset="UTF-8"><title>Relatório de Orçamentos</title>
            <style>
                body{font-family:Arial,sans-serif;padding:30px;}
                h1{color:#1a1a2e;border-bottom:2px solid #4f46e5;padding-bottom:10px;}
                table{width:100%;border-collapse:collapse;margin-top:16px;}
                th{background:#4f46e5;color:white;padding:10px 12px;text-align:left;}
                td{padding:8px 12px;border-bottom:1px solid #e2e8f0;}
                .total{font-weight:bold;background:#f0f4ff;}
                .status-pendente{color:#92400e;}
                .status-aprovado{color:#065f46;}
                .status-finalizado{color:#3730a3;}
                .status-cancelado{color:#991b1b;}
                .footer{margin-top:30px;color:#94a3b8;font-size:13px;text-align:center;border-top:1px solid #e2e8f0;padding-top:16px;}
            </style>
            </head><body>
            <h1>📋 Relatório de Orçamentos</h1>
            <p><strong>Data:</strong> ${new Date().toLocaleString('pt-BR')}</p>
            <p><strong>Total:</strong> ${orcamentosFiltrados.length} orçamentos</p>
            <p><strong>Status filtrado:</strong> ${filtroStatusAtual === 'todos' ? 'Todos' : filtroStatusAtual}</p>
            <hr>
            <table>
                <tr><th>#</th><th>Cliente</th><th>Contato</th><th>Cômodos</th><th>Itens</th><th>Valor Total</th><th>Status</th></tr>`;

            orcamentosFiltrados.forEach((orc, idx) => {
                const statusClass = `status-${orc.status}`;
                html += `
                    <tr>
                        <td>${idx + 1}</td>
                        <td><strong>${orc.clienteNome}</strong></td>
                        <td>${orc.telefone || '-'}</td>
                        <td style="text-align:center;">${orc.comodos || 0}</td>
                        <td style="text-align:center;">${orc.itens || 0}</td>
                        <td style="font-weight:bold;">R$ ${(orc.valorTotal || 0).toFixed(2)}</td>
                        <td class="${statusClass}">${orc.status}</td>
                    </tr>
                `;
            });

            const totalGeral = orcamentosFiltrados.reduce((s, o) => s + (o.valorTotal || 0), 0);

            html += `
                <tr class="total">
                    <td colspan="5" style="text-align:right;">TOTAL GERAL</td>
                    <td style="font-weight:bold;font-size:16px;color:#4f46e5;">R$ ${totalGeral.toFixed(2)}</td>
                    <td></td>
                </tr>
            </table>
            <div class="footer">
                Relatório gerado automaticamente pelo sistema SmartHome Automação
            </div>
            </body></html>`;

            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([html], { type: 'text/html;charset=utf-8' }));
            a.download = `relatorio_orcamentos_${new Date().toISOString().slice(0,10)}.html`;
            a.click();
            mostrarNotificacao('📊 Relatório exportado com sucesso!', 'success');
        }

        // =============================================
        //  ESCUTAR MUDANÇAS
        // =============================================
        function escutarMudancas() {
            try {
                const db = getDb();
                if (!db) return;

                // Escutar mudanças em orcamentos_comodo
                const ref = db.database.ref('orcamentos_comodo');
                ref.on('value', () => {
                    console.log('🔄 Mudança detectada em orcamentos_comodo, recarregando...');
                    carregarOrcamentos();
                });

                // Escutar mudanças em orcamentos_status
                const refStatus = db.database.ref('orcamentos_status');
                refStatus.on('value', () => {
                    console.log('🔄 Mudança detectada em orcamentos_status, recarregando...');
                    carregarOrcamentos();
                });

                console.log('👂 Escutando mudanças no Firebase...');
            } catch (error) {
                console.error('❌ Erro ao configurar escuta:', error);
            }
        }

        // =============================================
        //  INICIALIZAR
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
            }

            carregarOrcamentos();

            setTimeout(() => {
                escutarMudancas();
            }, 2000);

            setInterval(carregarOrcamentos, 30000);
        });
    </script>
</body>
</html>
