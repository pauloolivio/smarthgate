<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* ===== RESET E BASE ===== */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            transition: background 0.2s;
        }

        /* ===== PAGE HEADER ===== */
        .page-header {
            padding: 16px 24px;
            background: #f8fafc;
            border-bottom: 2px solid #e9edf2;
        }

        .page-header h2 {
            color: #0f172a;
            margin: 0;
            font-size: 1.4rem;
        }

        .page-header p {
            color: #64748b;
            font-size: 14px;
            margin: 4px 0 0;
        }

        /* ===== GRID CARDS ===== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            padding: 24px;
        }

        .card-dashboard {
            background: #ffffff;
            border: 1px solid #e9edf2;
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card-dashboard:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .card-dashboard .numero {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin-top: 4px;
        }

        .card-dashboard .label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .card-dashboard .icone {
            font-size: 24px;
            opacity: 0.6;
            float: right;
        }

        .card-dashboard .sub-info {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .card-dashboard.primary .numero { color: #4f46e5; }
        .card-dashboard.success .numero { color: #0b9e5e; }
        .card-dashboard.warning .numero { color: #f59e0b; }
        .card-dashboard.danger .numero { color: #dc2626; }
        .card-dashboard.info .numero { color: #0ea5e9; }
        .card-dashboard.purple .numero { color: #8b5cf6; }

        /* ===== GRID 2 COLUNAS ===== */
        .dashboard-grid-dois {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 0 24px 24px;
        }

        .card-status-resumo {
            background: #ffffff;
            border: 1px solid #e9edf2;
            border-radius: 12px;
            padding: 16px 20px;
        }

        .card-status-resumo h3 {
            font-size: 14px;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 12px;
            margin-top: 0;
        }

        .card-status-resumo .status-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid #f1f5f9;
        }

        .card-status-resumo .status-item:last-child {
            border-bottom: none;
        }

        .card-status-resumo .status-item .label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #334155;
        }

        .card-status-resumo .status-item .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .card-status-resumo .status-item .dot.aprovado { background: #0b9e5e; }
        .card-status-resumo .status-item .dot.pendente { background: #f59e0b; }
        .card-status-resumo .status-item .dot.cancelado { background: #dc2626; }
        .card-status-resumo .status-item .dot.finalizado { background: #4f46e5; }

        .card-status-resumo .status-item .count {
            font-weight: 600;
            color: #0f172a;
        }

        /* ===== SEÇÃO ÚLTIMOS ORÇAMENTOS ===== */
        .dashboard-content {
            padding: 0 24px 24px;
        }

        .dashboard-content .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .dashboard-content .section-header h2 {
            color: #0f172a;
            font-size: 18px;
            margin: 0;
        }

        .dashboard-content .section-header .filtros {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .dashboard-content .section-header .filtros .btn-filtro {
            padding: 4px 14px;
            border: 1px solid #e9edf2;
            border-radius: 20px;
            font-size: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            color: #64748b;
        }

        .dashboard-content .section-header .filtros .btn-filtro:hover {
            background: #f1f5f9;
        }

        .dashboard-content .section-header .filtros .btn-filtro.active {
            background: #4f46e5;
            border-color: #4f46e5;
            color: white;
        }

        /* ===== LISTA COM ROLAGEM ===== */
        .lista-ultimos-container {
            background: #ffffff;
            border: 1px solid #e9edf2;
            border-radius: 12px;
            overflow: hidden;
            max-height: 320px;
            overflow-y: auto;
        }

        .lista-ultimos-container::-webkit-scrollbar {
            width: 6px;
        }

        .lista-ultimos-container::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .lista-ultimos-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .lista-ultimos-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .lista-ultimos {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .lista-ultimos li {
            padding: 12px 16px;
            border-bottom: 1px solid #e9edf2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            flex-wrap: wrap;
            gap: 8px;
            background: #ffffff;
        }

        .lista-ultimos li:nth-child(even) {
            background: #fafbfc;
        }

        .lista-ultimos li:last-child {
            border-bottom: none;
        }

        .lista-ultimos .cliente {
            font-weight: 500;
            color: #0f172a;
        }

        .lista-ultimos .valor {
            font-weight: 600;
            color: #4f46e5;
            white-space: nowrap;
        }

        .lista-ultimos .data {
            color: #94a3b8;
            font-size: 12px;
        }

        .lista-ultimos .comodos-badge {
            font-size: 11px;
            color: #64748b;
            background: #e9edf2;
            padding: 1px 10px;
            border-radius: 12px;
            margin-left: 4px;
            white-space: nowrap;
        }

        .badge-status {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
        }

        .badge-status.aprovado { background: #d1fae5; color: #065f46; }
        .badge-status.pendente { background: #fef3c7; color: #92400e; }
        .badge-status.cancelado { background: #fee2e2; color: #991b1b; }
        .badge-status.finalizado { background: #e0e7ff; color: #3730a3; }

        /* ===== LOADING ===== */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e9edf2;
            border-top: 2px solid #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== DARK MODE ===== */
        body.dark-mode .page-header {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .page-header h2 {
            color: #f1f5f9;
        }

        body.dark-mode .card-dashboard {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .card-dashboard .numero {
            color: #f1f5f9;
        }

        body.dark-mode .card-dashboard .sub-info {
            color: #64748b;
        }

        body.dark-mode .lista-ultimos-container {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .lista-ultimos-container::-webkit-scrollbar-track {
            background: #0f172a;
        }

        body.dark-mode .lista-ultimos-container::-webkit-scrollbar-thumb {
            background: #475569;
        }

        body.dark-mode .lista-ultimos-container::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        body.dark-mode .lista-ultimos li {
            background: #1e293b;
            border-color: #334155;
            color: #f1f5f9;
        }

        body.dark-mode .lista-ultimos li:nth-child(even) {
            background: #162033;
        }

        body.dark-mode .lista-ultimos .cliente {
            color: #f1f5f9;
        }

        body.dark-mode .lista-ultimos .comodos-badge {
            background: #334155;
            color: #94a3b8;
        }

        body.dark-mode .badge-status.aprovado {
            background: #065f46;
            color: #d1fae5;
        }

        body.dark-mode .badge-status.pendente {
            background: #92400e;
            color: #fef3c7;
        }

        body.dark-mode .badge-status.cancelado {
            background: #991b1b;
            color: #fee2e2;
        }

        body.dark-mode .badge-status.finalizado {
            background: #3730a3;
            color: #e0e7ff;
        }

        body.dark-mode .card-status-resumo {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .card-status-resumo h3 {
            color: #94a3b8;
        }

        body.dark-mode .card-status-resumo .status-item {
            border-color: #334155;
        }

        body.dark-mode .card-status-resumo .status-item .label {
            color: #cbd5e1;
        }

        body.dark-mode .card-status-resumo .status-item .count {
            color: #f1f5f9;
        }

        body.dark-mode .dashboard-content .section-header .filtros .btn-filtro {
            background: #1e293b;
            border-color: #334155;
            color: #94a3b8;
        }

        body.dark-mode .dashboard-content .section-header .filtros .btn-filtro.active {
            background: #4f46e5;
            border-color: #4f46e5;
            color: white;
        }

        body.dark-mode .dashboard-content .section-header h2 {
            color: #f1f5f9;
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 992px) {
            .dashboard-grid-dois {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 12px 16px;
            }
            .page-header h2 {
                font-size: 1.2rem;
            }

            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
                padding: 16px;
                gap: 12px;
            }

            .card-dashboard .numero {
                font-size: 22px;
            }

            .dashboard-grid-dois {
                grid-template-columns: 1fr;
                padding: 0 16px 16px;
            }

            .dashboard-content {
                padding: 0 16px 16px;
            }

            .dashboard-content .section-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .lista-ultimos-container {
                max-height: 280px;
            }

            .lista-ultimos li {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .lista-ultimos .valor {
                align-self: flex-end;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                padding: 12px;
                gap: 10px;
            }

            .card-dashboard {
                padding: 12px 16px;
            }

            .card-dashboard .numero {
                font-size: 20px;
            }

            .dashboard-grid-dois {
                padding: 0 12px 12px;
            }

            .dashboard-content {
                padding: 0 12px 12px;
            }

            .dashboard-content .section-header .filtros .btn-filtro {
                font-size: 11px;
                padding: 3px 10px;
            }

            .lista-ultimos-container {
                max-height: 240px;
            }

            .lista-ultimos li {
                font-size: 13px;
                padding: 10px 12px;
            }

            .badge-status {
                font-size: 10px;
                padding: 1px 8px;
            }

            .lista-ultimos .comodos-badge {
                font-size: 10px;
                padding: 0 8px;
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h2>📊 Dashboard</h2>
        <p>Visão geral do sistema de orçamento</p>
    </div>

    <!-- Cards Principais -->
    <div class="dashboard-grid" id="dashboardStats">
        <div class="card-dashboard primary">
            <span class="icone">👤</span>
            <div class="label">Clientes</div>
            <div class="numero" id="totalClientes">0</div>
        </div>
        <div class="card-dashboard success">
            <span class="icone">📦</span>
            <div class="label">Produtos</div>
            <div class="numero" id="totalProdutos">0</div>
        </div>
        <div class="card-dashboard warning">
            <span class="icone">📄</span>
            <div class="label">Orçamentos</div>
            <div class="numero" id="totalOrcamentos">0</div>
        </div>
        <div class="card-dashboard danger">
            <span class="icone">💰</span>
            <div class="label">Valor Total</div>
            <div class="numero" id="valorTotal">R$ 0</div>
        </div>
    </div>

    <!-- Resumo por Status + Maiores Orçamentos -->
    <div class="dashboard-grid-dois">
        <div class="card-status-resumo">
            <h3>📋 Orçamentos por Status</h3>
            <div id="statusResumo">
                <div class="status-item">
                    <span class="label"><span class="dot pendente"></span> Pendentes</span>
                    <span class="count" id="statusPendente">0</span>
                </div>
                <div class="status-item">
                    <span class="label"><span class="dot aprovado"></span> Aprovados</span>
                    <span class="count" id="statusAprovado">0</span>
                </div>
                <div class="status-item">
                    <span class="label"><span class="dot finalizado"></span> Finalizados</span>
                    <span class="count" id="statusFinalizado">0</span>
                </div>
                <div class="status-item">
                    <span class="label"><span class="dot cancelado"></span> Cancelados</span>
                    <span class="count" id="statusCancelado">0</span>
                </div>
            </div>
        </div>

        <div class="card-status-resumo">
            <h3>🏆 Maiores Orçamentos</h3>
            <div id="maioresOrcamentos">
                <div style="text-align:center;color:#94a3b8;padding:20px;font-size:13px;">
                    <span class="loading-spinner"></span> Carregando...
                </div>
            </div>
        </div>
    </div>

    <!-- Últimos Orçamentos com barra de rolagem -->
    <div class="dashboard-content">
        <div class="section-header">
            <h2>📋 Últimos Orçamentos</h2>
            <div class="filtros" id="filtrosStatus">
                <button class="btn-filtro active" data-status="todos" onclick="filtrarOrcamentos('todos')">Todos</button>
                <button class="btn-filtro" data-status="pendente" onclick="filtrarOrcamentos('pendente')">⏳ Pendentes</button>
                <button class="btn-filtro" data-status="aprovado" onclick="filtrarOrcamentos('aprovado')">✅ Aprovados</button>
                <button class="btn-filtro" data-status="finalizado" onclick="filtrarOrcamentos('finalizado')">🔵 Finalizados</button>
                <button class="btn-filtro" data-status="cancelado" onclick="filtrarOrcamentos('cancelado')">❌ Cancelados</button>
            </div>
        </div>
        <div class="lista-ultimos-container">
            <ul class="lista-ultimos" id="ultimosOrcamentos">
                <li style="text-align: center; color: #94a3b8; padding: 24px; justify-content: center;">
                    <span class="loading-spinner"></span> Carregando...
                </li>
            </ul>
        </div>
    </div>

    <script>
        // ============ VARIÁVEIS GLOBAIS ============
        let todosOrcamentos = [];
        let orcamentosFiltrados = [];
        let filtroAtual = 'todos';

        // ============ ACESSO AO DB ============
        function getDb() {
            try {
                if (window.parent && window.parent.getParentDb) {
                    return window.parent.getParentDb();
                }
                if (window.parent && window.parent.getDadosGlobais) {
                    return window.parent.getDadosGlobais().db;
                }
                if (window.db) {
                    return window.db;
                }
                return null;
            } catch (error) {
                console.error('Erro ao acessar database:', error);
                return null;
            }
        }

        // ============ FORMATADORES ============
        function fmtBRL(v) {
            return 'R$ ' + Number(v || 0).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        function fmtDate(dateString) {
            if (!dateString) return '-';
            try {
                return new Date(dateString).toLocaleDateString('pt-BR');
            } catch {
                return '-';
            }
        }

        function getStatusLabel(status) {
            const labels = {
                'aprovado': '✅ Aprovado',
                'pendente': '⏳ Pendente',
                'cancelado': '❌ Cancelado',
                'finalizado': '🔵 Finalizado'
            };
            return labels[status] || status || 'Pendente';
        }

        function getStatusClass(status) {
            const classes = {
                'aprovado': 'aprovado',
                'pendente': 'pendente',
                'cancelado': 'cancelado',
                'finalizado': 'finalizado'
            };
            return classes[status] || 'pendente';
        }

        // ============ CARREGAR DASHBOARD ============
        async function carregarDashboard() {
            try {
                const db = getDb();
                if (!db) throw new Error('Database não disponível');

                console.log('📊 Carregando dashboard...');

                const [clientes, produtos, orcamentos] = await Promise.all([
                    db.getClientes(),
                    db.getProdutos(),
                    carregarOrcamentosComStatus(db)
                ]);

                todosOrcamentos = orcamentos;
                orcamentosFiltrados = [...todosOrcamentos];

                // ===== CARDS =====
                document.getElementById('totalClientes').textContent = clientes.length;
                document.getElementById('totalProdutos').textContent = produtos.length;
                document.getElementById('totalOrcamentos').textContent = orcamentos.length;

                let totalGeral = 0;
                orcamentos.forEach(orc => {
                    if (orc.valorTotal) totalGeral += orc.valorTotal;
                });
                document.getElementById('valorTotal').textContent = fmtBRL(totalGeral);

                // ===== STATUS RESUME =====
                const statusCount = { pendente: 0, aprovado: 0, finalizado: 0, cancelado: 0 };
                orcamentos.forEach(orc => {
                    const status = orc.status || 'pendente';
                    if (statusCount[status] !== undefined) statusCount[status]++;
                });

                document.getElementById('statusPendente').textContent = statusCount.pendente;
                document.getElementById('statusAprovado').textContent = statusCount.aprovado;
                document.getElementById('statusFinalizado').textContent = statusCount.finalizado;
                document.getElementById('statusCancelado').textContent = statusCount.cancelado;

                // ===== MAIORES ORÇAMENTOS =====
                carregarMaioresOrcamentos(orcamentos);

                // ===== ÚLTIMOS ORÇAMENTOS =====
                aplicarFiltro();

                if (window.parent && window.parent.atualizarStatus) {
                    window.parent.atualizarStatus(`✅ Dashboard atualizado: ${clientes.length} clientes, ${produtos.length} produtos, ${orcamentos.length} orçamentos`);
                }

                console.log('✅ Dashboard carregado com sucesso');

            } catch (error) {
                console.error('❌ Erro ao carregar dashboard:', error);
                document.getElementById('ultimosOrcamentos').innerHTML = `
                    <li style="text-align: center; color: #dc2626; padding: 24px; justify-content: center;">
                        ❌ Erro ao carregar dados: ${error.message}
                    </li>
                `;
            }
        }

        // ============ CARREGAR ORÇAMENTOS COM STATUS ============
        async function carregarOrcamentosComStatus(db) {
            try {
                const clientes = await db.getClientes();
                const orcamentos = [];

                for (const cliente of clientes) {
                    const data = await db.getOrcamentoComodo(cliente.id);
                    if (data && Object.keys(data).length > 0) {
                        let total = 0;
                        let itens = 0;
                        const comodosSet = new Set();

                        Object.values(data).forEach(entry => {
                            if (entry && entry.qtd > 0) {
                                total += (entry.qtd || 0) * (entry.preco || 0);
                                itens += entry.qtd || 0;
                                if (entry.comodo) comodosSet.add(entry.comodo);
                            }
                        });

                        if (total > 0) {
                            let status = 'pendente';
                            try {
                                const orcStatus = await db.getOrcamentoStatus(cliente.id);
                                if (orcStatus && orcStatus.status) {
                                    status = orcStatus.status;
                                }
                            } catch (e) { /* ignora */ }

                            orcamentos.push({
                                clienteId: cliente.id,
                                clienteNome: cliente.nome || 'Cliente sem nome',
                                valorTotal: total,
                                itens: itens,
                                comodos: comodosSet.size,
                                status: status,
                                dataCriacao: new Date().toISOString(),
                                dataAtualizacao: new Date().toISOString()
                            });
                        }
                    }
                }

                orcamentos.sort((a, b) => new Date(b.dataCriacao) - new Date(a.dataCriacao));
                return orcamentos;
            } catch (error) {
                console.error('❌ Erro ao carregar orçamentos:', error);
                return [];
            }
        }

        // ============ CARREGAR MAIORES ORÇAMENTOS ============
        function carregarMaioresOrcamentos(orcamentos) {
            const container = document.getElementById('maioresOrcamentos');

            if (!orcamentos || orcamentos.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;color:#94a3b8;padding:20px;font-size:13px;">
                        📭 Nenhum orçamento encontrado.
                    </div>
                `;
                return;
            }

            const top5 = [...orcamentos]
                .sort((a, b) => (b.valorTotal || 0) - (a.valorTotal || 0))
                .slice(0, 5);

            container.innerHTML = top5.map((orc, index) => `
                <div class="status-item">
                    <span class="label">
                        <span>${index + 1}. ${orc.clienteNome || 'Cliente'}</span>
                        <span style="font-size:11px;color:#94a3b8;margin-left:4px;">
                            (${orc.comodos || 0} cômodos)
                        </span>
                    </span>
                    <span class="count">${fmtBRL(orc.valorTotal || 0)}</span>
                </div>
            `).join('');
        }

        // ============ FILTRAR ORÇAMENTOS ============
        function filtrarOrcamentos(status) {
            filtroAtual = status;
            document.querySelectorAll('.btn-filtro').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.status === status);
            });
            aplicarFiltro();
        }

        function aplicarFiltro() {
            const lista = document.getElementById('ultimosOrcamentos');

            if (filtroAtual === 'todos') {
                orcamentosFiltrados = [...todosOrcamentos];
            } else {
                orcamentosFiltrados = todosOrcamentos.filter(o => o.status === filtroAtual);
            }

            if (orcamentosFiltrados.length === 0) {
                const msg = filtroAtual === 'todos' ? 'Nenhum orçamento cadastrado ainda.' : 
                    `Nenhum orçamento ${filtroAtual} encontrado.`;
                lista.innerHTML = `
                    <li style="text-align: center; color: #94a3b8; padding: 24px; justify-content: center;">
                        📭 ${msg}
                    </li>
                `;
                return;
            }

            const ultimos = orcamentosFiltrados.slice(0, 10);
            lista.innerHTML = ultimos.map(orc => `
                <li>
                    <span>
                        <span class="cliente">${orc.clienteNome || 'Cliente não definido'}</span>
                        <span class="data">${fmtDate(orc.dataCriacao)}</span>
                        <span class="badge-status ${getStatusClass(orc.status)}">${getStatusLabel(orc.status)}</span>
                        <span class="comodos-badge">🏠 ${orc.comodos || 0}</span>
                        <span class="comodos-badge">📦 ${orc.itens || 0}</span>
                    </span>
                    <span class="valor">${fmtBRL(orc.valorTotal || 0)}</span>
                </li>
            `).join('');
        }

        // ============ ESCUTAR MUDANÇAS ============
        function escutarMudancas() {
            try {
                const db = getDb();
                if (!db) return;

                const ref = db.database.ref('orcamentos_comodo');
                ref.on('value', () => {
                    console.log('🔄 Mudança detectada em orcamentos_comodo, recarregando...');
                    carregarDashboard();
                });

                const refStatus = db.database.ref('orcamentos_status');
                refStatus.on('value', () => {
                    console.log('🔄 Mudança detectada em orcamentos_status, recarregando...');
                    carregarDashboard();
                });

                console.log('👂 Escutando mudanças no Firebase...');
            } catch (error) {
                console.error('❌ Erro ao configurar escuta:', error);
            }
        }

        // ============ INICIALIZAR ============
        document.addEventListener('DOMContentLoaded', function() {
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
            }

            carregarDashboard();

            setTimeout(() => {
                escutarMudancas();
            }, 2000);

            setInterval(carregarDashboard, 30000);
        });
    </script>
</body>
</html>
