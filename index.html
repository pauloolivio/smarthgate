<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHome - Sistema de Orçamento</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-database-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <!-- Database Layer -->
    <script src="js/db.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS do Sistema -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
        }

        .main-content {
            flex: 1;
            overflow: hidden;
            background: #f8fafc;
            position: relative;
        }

        .main-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #f8fafc;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(248, 250, 252, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-overlay .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e9edf2;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            margin-top: 16px;
            color: #64748b;
            font-size: 14px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header">
            <div class="logo-area">
                <span class="logo-icon">🏠</span>
                <div>
                    <h1>SmartHome</h1>
                    <p>Sistema de Orçamento</p>
                </div>
            </div>
            <div class="header-actions">
                <span class="user-info" style="font-size:13px;color:#64748b;font-weight:500;"></span>
                <span id="statusConexao" class="status-badge offline">🔴 Desconectado</span>
                <button class="btn btn-outline btn-sm" onclick="sair()">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </header>

        <!-- NAVEGAÇÃO PRINCIPAL -->
        <nav class="main-nav">
            <button class="nav-item active" data-page="dashboard" onclick="navegarPara('dashboard')">
                <i class="fas fa-chart-pie"></i> Dashboard
            </button>
            <button class="nav-item" data-page="clientes" onclick="navegarPara('clientes')">
                <i class="fas fa-users"></i> Clientes
            </button>
            <button class="nav-item" data-page="produtos" onclick="navegarPara('produtos')">
                <i class="fas fa-boxes"></i> Produtos
            </button>
            <button class="nav-item" data-page="orcamento-comodo" onclick="navegarPara('orcamento-comodo')">
                <i class="fas fa-layer-group"></i> Orç. por Cômodo
            </button>
            <button class="nav-item" data-page="orcamento-total" onclick="navegarPara('orcamento-total')">
                <i class="fas fa-calculator"></i> Orçamento Total
            </button>
            <button class="nav-item" data-page="orcamento-print" onclick="abrirImpressaoOrcamento()">
                <i class="fas fa-print"></i> Imprimir
            </button>
            <button class="nav-item" data-page="configuracoes" onclick="navegarPara('configuracoes')">
                <i class="fas fa-cog"></i> Configurações
            </button>
        </nav>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="main-content">
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <p>Carregando...</p>
            </div>
            <iframe id="pageFrame" src="pages/dashboard.html" frameborder="0"></iframe>
        </main>

        <!-- FOOTER -->
        <footer class="app-footer">
            <span>© 2026 SmartHome - Sistema de Orçamento v2.0</span>
            <span id="footerStatus">✅ Pronto</span>
        </footer>
    </div>

    <!-- JavaScript do Sistema -->
    <script src="js/app.js"></script>
    
    <script>
        // ============ EXPORTA FUNÇÕES GLOBAIS PARA OS IFRAMES ============
        // As funções precisam estar no objeto window para serem acessadas pelos iframes
        
        // ============ PROTEÇÃO DE ROTA ============
        (function() {
            const role = sessionStorage.getItem('userRole');
            const email = sessionStorage.getItem('userEmail');

            if (!role || !email) {
                window.location.href = 'login.html';
                return;
            }

            if (window.auth && window.auth.currentUser) {
                const user = window.auth.currentUser;
                if (user.email !== email) {
                    sessionStorage.clear();
                    window.location.href = 'login.html';
                    return;
                }
            }
        })();

        // ============ FUNÇÕES GLOBAIS (ACESSÍVEIS PELOS IFRAMES) ============
        window.getDadosGlobais = function() {
            return {
                db: window.db || {},
                auth: window.auth || {},
                firestore: window.firestore || {},
                database: window.database || {}
            };
        };

        window.getParentDb = function() {
            try {
                if (window.db) {
                    return window.db;
                }
                return null;
            } catch (error) {
                console.error('Erro ao acessar database:', error);
                return null;
            }
        };

        // ============ NAVEGAÇÃO ============
        window.navegarPara = function(pagina) {
            const pageMap = {
                'dashboard': 'dashboard.html',
                'clientes': 'clientes.html',
                'produtos': 'produtos.html',
                'orcamento-comodo': 'orcamento-comodo.html',
                'orcamento-total': 'orcamento-total.html',
                'orcamento-print': 'orcamento-print.html',
                'configuracoes': 'configuracoes.html'
            };
            
            const fileName = pageMap[pagina] || 'dashboard.html';
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.page === pagina);
            });

            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('hidden');

            const frame = document.getElementById('pageFrame');
            if (frame) {
                frame.src = `pages/${fileName}`;
                frame.onload = function() {
                    overlay.classList.add('hidden');
                };
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 3000);
            }

            const nomes = {
                'dashboard': '📊 Dashboard',
                'clientes': '👤 Clientes',
                'produtos': '📦 Produtos',
                'orcamento-comodo': '🏗️ Orç. por Cômodo',
                'orcamento-total': '💰 Orçamento Total',
                'orcamento-print': '🖨️ Impressão',
                'configuracoes': '⚙️ Configurações'
            };
            window.atualizarStatus(`📄 ${nomes[pagina] || pagina}`);
            
            window.location.hash = pagina;
        };

        // ============ STATUS ============
        window.atualizarStatus = function(mensagem) {
            const el = document.getElementById('footerStatus');
            if (el) {
                el.textContent = mensagem;
            }
        };

        // ============ STATUS DE CONEXÃO ============
        window.atualizarConexao = function(online) {
            const badge = document.getElementById('statusConexao');
            if (badge) {
                badge.textContent = online ? '🟢 Conectado' : '🔴 Desconectado';
                badge.className = `status-badge ${online ? 'online' : 'offline'}`;
            }
        };

        // ============ LOGOUT ============
        window.sair = async function() {
            if (!confirm('Tem certeza que deseja sair?')) return;
            
            try {
                if (window.auth) {
                    await window.auth.signOut();
                }
                sessionStorage.clear();
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Erro ao sair:', error);
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        };

        // ============ ABRIR IMPRESSÃO ============
        window.abrirImpressaoOrcamento = function() {
            const frame = document.getElementById('pageFrame');
            if (frame && frame.contentWindow) {
                frame.contentWindow.postMessage({ type: 'getOrcamentoData' }, '*');
                
                const handler = (event) => {
                    if (event.data && event.data.type === 'orcamentoDataResponse') {
                        window.removeEventListener('message', handler);
                        const dados = event.data.dados;
                        
                        if (!dados || !dados.produtos || dados.produtos.length === 0) {
                            alert('⚠️ Nenhum orçamento para imprimir. Adicione produtos primeiro.');
                            return;
                        }
                        
                        localStorage.setItem('orcamentoPrintData', JSON.stringify(dados));
                        
                        const frame2 = document.getElementById('pageFrame');
                        if (frame2) {
                            frame2.src = 'pages/orcamento-print.html';
                            frame2.onload = function() {
                                setTimeout(() => {
                                    frame2.contentWindow.postMessage({
                                        type: 'orcamentoData',
                                        dados: dados
                                    }, '*');
                                }, 300);
                            };
                            
                            document.querySelectorAll('.nav-item').forEach(item => {
                                item.classList.toggle('active', item.dataset.page === 'orcamento-print');
                            });
                            
                            window.location.hash = 'orcamento-print';
                            window.atualizarStatus('📄 Orçamento para impressão');
                        }
                    }
                };
                
                window.addEventListener('message', handler);
                
                setTimeout(() => {
                    window.removeEventListener('message', handler);
                }, 3000);
            } else {
                alert('⚠️ Nenhum orçamento para imprimir.');
            }
        };

        // ============ ABRIR IMPRESSÃO COM DADOS ============
        window.abrirImpressaoComDados = function(dados) {
            localStorage.setItem('orcamentoPrintData', JSON.stringify(dados));
            window.navegarPara('orcamento-print');
            
            setTimeout(() => {
                const frame = document.getElementById('pageFrame');
                if (frame && frame.contentWindow) {
                    frame.contentWindow.postMessage({
                        type: 'orcamentoData',
                        dados: dados
                    }, '*');
                }
            }, 500);
        };

        // ============ MONITORAR CONEXÃO ============
        function monitorarConexao() {
            const online = navigator.onLine;
            window.atualizarConexao(online);

            window.addEventListener('online', () => {
                window.atualizarConexao(true);
                window.atualizarStatus('🟢 Conexão restaurada');
            });

            window.addEventListener('offline', () => {
                window.atualizarConexao(false);
                window.atualizarStatus('🔴 Sem conexão com a internet');
            });
        }

        // ============ INICIALIZAR ============
        document.addEventListener('DOMContentLoaded', function() {
            const pagina = window.location.hash.replace('#', '') || 'dashboard';
            const paginasValidas = ['dashboard', 'clientes', 'produtos', 'orcamento-comodo', 'orcamento-total', 'configuracoes'];
            const paginaFinal = paginasValidas.includes(pagina) ? pagina : 'dashboard';
            
            const email = sessionStorage.getItem('userEmail');
            const userDisplay = document.querySelector('.header-actions .user-info');
            if (userDisplay && email) {
                userDisplay.textContent = `👤 ${email}`;
            }

            monitorarConexao();
            window.navegarPara(paginaFinal);

            setInterval(() => {
                if (window.db && window.db.getClientes) {
                    window.db.getClientes().then(() => {
                        window.atualizarConexao(true);
                    }).catch(() => {
                        window.atualizarConexao(false);
                    });
                }
            }, 30000);

            console.log('✅ Sistema inicializado');
            console.log(`👤 Usuário: ${email}`);
        });
    </script>
</body>
</html>
